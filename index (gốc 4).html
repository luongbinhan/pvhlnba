    <style>
        :root { --brand: #1FA3B0; --highlight: #FB8500; --bg-main: #E0F2FE; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: #1e293b; overflow-x: hidden; }
        [x-cloak] { display: none !important; }
        b, strong, .font-bold { font-weight: 900 !important; }

        /* Tag kép: Vị trí (Xanh banner) > Khối (Đỏ) */
        .tag-cat-name { background: var(--brand); color: white; padding: 4px 12px; border-radius: 99px 0 0 99px; font-size: 10px; font-weight: 900; text-transform: uppercase; border-right: 1px solid rgba(255,255,255,0.3); }
        .tag-block-name { background: #E11D48; color: white; padding: 4px 12px; border-radius: 0 99px 99px 0; font-size: 10px; font-weight: 900; text-transform: uppercase; }

        /* Search Overlay Đỏ */
        .search-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(225, 29, 72, 0.9); backdrop-blur: 4px; padding: 4px; text-align: center; z-index: 5; }

        /* Modal Profile: Ảnh mini góc trái */
        /* MODAL CỐ ĐỊNH KÍCH THƯỚC */
/* MODAL CONTAINER: Cố định chiều cao và cho phép cuộn nội dung */
.modal-container { 
    background: white; 
    border-radius: 24px; 
    width: 95%; 
    max-width: 900px; 
    max-height: 85vh; /* Không tràn màn hình trên cả PC & Mobile */
    position: relative; 
    overflow: hidden; 
    display: flex;
    flex-direction: column;
}

.modal-body-scroll { 
    overflow-y: auto; 
    flex: 1; 
    padding-bottom: 40px;
}

/* ẢNH CHI TIẾT: Tối ưu hiển thị theo thiết bị */
.img-profile-mini { 
    display: block;
    object-fit: cover;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    border: 4px solid white;
    z-index: 10;
}


/* Cố định chiều cao vùng Database để cuộn riêng */
.scroll-admin-db {
    max-height: calc(100vh - 150px); /* Tự động tính toán chiều cao theo màn hình */
    overflow-y: auto;
    padding-right: 10px;
}

/* Tùy chỉnh thanh cuộn cho đẹp */
.scroll-admin-db::-webkit-scrollbar {
    width: 6px;
}
.scroll-admin-db::-webkit-scrollbar-thumb {
    background: #CBD5E1;
    border-radius: 10px;
}


/* Huy hiệu góc card với nền bo khuyết 45 độ */
.badge-taicu {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 25px;
    height: 25px;
    background: #FFD700; /* Nền vàng (có thể chỉnh sang màu nhạt hơn như #FFEDD5 nếu muốn giống hệt mẫu) */
    /* Bo góc khuyết: Chỉ bo góc trên-trái để tạo đường cong ngược */
    border-radius: 100% 0 0 0; 
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    z-index: 20;
}

.badge-taicu::after {
    content: '★';
    color: #E11D48; /* Sao đỏ */
    font-size: 16px;
    margin-right: 2px;
    margin-bottom: 1px;
}

/* 1. Thiết lập độ mượt cho card */
.person-card {
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    z-index: 1; /* Ở trạng thái bình thường z-index thấp */
}

.person-card:hover {
    /* Quan trọng: z-index phải cao hơn giá trị z-50 của header */
    z-index: 100 !important; 
    transform: translateY(-15px) scale(1.05); /* Nhấc cao hơn để thấy rõ hiệu ứng */
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25) !important;
}

/* Đảm bảo khối cha chứa các card không kìm hãm z-index */
main, .grid {
    isolation: isolate; 
}

/* 3. Hiệu ứng cho ảnh bên trong (Phóng to ảnh) */
.person-card:hover img {
    transform: scale(1.1); /* Ảnh phóng to 10% */
    transition: transform 0.6s ease;
}

/* 4. Thêm hiệu ứng mượt mà cho ảnh khi không hover */
.person-card img {
    transition: transform 0.6s ease;
}

/* Cấu hình riêng cho Mobile (Dưới 768px) */
@media (max-width: 767px) {
    .img-profile-mini { 
        position: relative; /* Nằm trong luồng văn bản */
        margin: 20px auto 10px auto; /* Căn giữa và đẩy lên trên cùng */
        width: 120px; 
        height: 160px; 
    }
    .modal-content-wrapper { 
        padding: 20px !important; /* Nội dung sát dưới ảnh */
    }
}

/* Cấu hình riêng cho PC (Từ 768px trở lên) - GIỮ NGUYÊN NHƯ CŨ */
@media (min-width: 768px) {
    .img-profile-mini { 
        position: absolute; 
        top: 30px; 
        left: 30px; 
        width: 140px; 
        height: 180px; 
        margin: 0;
    }
    .modal-content-wrapper { 
        padding: 40px 40px 40px 200px; /* Chừa khoảng trống bên trái cho ảnh */
    }
}



        .admin-sidebar { width: 300px; background: #0F172A; color: white; flex-shrink: 0; padding: 1.5rem; height: 100vh; overflow-y: auto; }
        .input-admin { border: 2px solid #94A3B8; border-radius: 8px; padding: 8px 12px; width: 100%; font-weight: 700; color: #000 !important; background: white; }
        .db-row { background: white; border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 8px 12px; transition: 0.2s; cursor: move; color: #000; }

        .person-card { transition: all 0.3s ease; border: 1px solid #cbd5e1; background: white; border-radius: 12px; overflow: hidden; cursor: pointer; }
        .person-card:hover { 
    z-index: 100 !important; 
    transform: translateY(-15px) scale(1.05); 
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25) !important; 
}

                                    <div class="flex items-center gap-3 cursor-pointer group" @click="toggleTab(cat)">
                                        <svg class="w-5 h-5 transition-transform duration-300" :class="openTabs[cat] ? 'rotate-0' : '-rotate-90'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
                                        <h4 class="font-black text-brand uppercase text-[13px] group-hover:text-highlight" x-text="cat"></h4>
                                    </div>
                                    <div class="flex gap-1 text-black">
                                        <input type="text" :id="'new-block-'+cat" placeholder="Khối..." class="border p-1.5 rounded text-[10px] font-bold w-32 outline-none">
                                        <button @click="addNewBlockAt(cat)" class="bg-red-600 text-white px-3 rounded text-[12px] font-black hover:bg-red-700">+</button>
                                    </div>
                                </div>
                                <div x-show="openTabs[cat]" x-collapse x-cloak>
                                    <template x-for="blockName in (blocks[cat] || [])" :key="blockName">
                                        <div class="mb-8 last:mb-0">
                                            <div class="flex justify-between items-center mb-3">
                                                <p class="text-[11px] font-black text-slate-400 uppercase flex items-center gap-3"><span x-text="blockName"></span><span class="h-[1.5px] w-24 bg-slate-200"></span></p>
                                                <button @click="deleteBlockAt(cat, blockName)" class="text-red-500 text-[9px] font-bold uppercase">Xóa Khối</button>
                                            </div>
                                            <div :id="'sortable-db-' + cat + '-' + blockName" class="space-y-2 min-h-[30px] p-1">
                                                <template x-for="p in getPeopleInDB(cat, blockName)" :key="p.id">
                                                    <div :data-id="p.id" class="db-row flex items-center justify-between group shadow-sm bg-white p-2 rounded-lg">
                                                        <div class="flex items-center gap-4 text-black"><span class="text-slate-300 font-bold">☰</span><img :src="getImgUrl(p.img)" class="w-10 h-10 rounded-full object-cover"><p class="text-[13px] font-black" x-text="p.name"></p></div>
                                                        <div class="flex gap-3 opacity-0 group-hover:opacity-100 transition-all"><button @click="editPersonnel(p)" class="text-blue-500 font-black text-[10px] uppercase">Sửa</button><button @click="deletePersonnel(p.id)" class="text-red-500 font-black text-[10px] uppercase">Xóa</button></div>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </div> 
            </div>
        </div>
    </div>

    <script>
    function app() {
        return {
            isAdmin: false, search: '', activeGroup: 'VIP', filterCategory: 'Tất cả', selectedPerson: null,
            editingId: null, sortCat: '', newCatName: '', newPinInput: '', openTabs: {},
            categories: [], blocks: {}, catGroups: {}, blocksOrder: {}, data: [], 
            // Không để mật khẩu mặc định ở đây để tránh lộ thông tin
            auth: { pin: '', masterPin: '' }, 
            types: ['Giữ nguyên', 'Tái cử', 'Lần đầu'],
            form: { name: '', mainRole: '', category: '', block: '', type: 'Giữ nguyên', img: '', dob: '', hometown: '', ethnic: 'Kinh', education: '', roles: '', bio: '' },

            async init() {
                // Config Firebase giữ nguyên theo dự án của bạn
                const cfg = { apiKey: "AIzaSyAhbVR_ywdzMNnwaeKMp5rWNsT4otCF4xM", projectId: "pvhk-d32da", appId: "1:974778325507:web:eda0b36711f492cb764c36" };
                if (!firebase.apps.length) firebase.initializeApp(cfg);
                this.db = firebase.firestore();

                // Lắng nghe dữ liệu nhân sự
                this.db.collection("personnel_v8").orderBy("order", "asc").onSnapshot(s => { 
                    this.data = s.docs.map(d => ({id: d.id, ...d.data()})); 
                    this.$nextTick(() => this.reinitSortables()); 
                });

                // Lắng nghe cấu trúc danh mục
                this.db.collection("config").doc("master_structure_v29").onSnapshot(doc => { 
                    if (doc.exists) { 
                        const d = doc.data(); 
                        this.categories = d.categories || []; 
                        this.blocks = d.blocks || {}; 
                        this.catGroups = d.catGroups || {}; 
                        this.blocksOrder = d.blocksOrder || {}; 
                        if(!this.sortCat) this.sortCat = this.categories[0]; 
                    } 
                });

                // Lấy mã PIN bảo mật từ Firebase (auth_v1)
                this.db.collection("config").doc("auth_v1").onSnapshot(doc => { 
                    if (doc.exists) { 
                        const d = doc.data(); 
                        // Lấy cả pin thường và masterPin từ DB
                        this.auth.pin = d.pin || d.Password || ''; 
                        this.auth.masterPin = d.masterPin || ''; 
                    } 
                });
            },

            reinitSortables() {
                const blockEl = document.getElementById('sortable-blocks-admin');
                if(blockEl) { if(blockEl._sortable) blockEl._sortable.destroy(); blockEl._sortable = Sortable.create(blockEl, { animation: 200 }); }
                this.categories.forEach(cat => { (this.blocks[cat] || []).forEach(block => {
                    const el = document.getElementById(`sortable-db-${cat}-${block}`);
                    if(el) { if(el._sortable) el._sortable.destroy(); el._sortable = Sortable.create(el, { animation: 200, handle: '.db-row', onEnd: async () => { await this.updatePersonnelOrder(el) } }); }
                }); });
            },

            async saveBlockOrder() {
                const el = document.getElementById('sortable-blocks-admin');
                if (!el) return alert("Không tìm thấy danh sách!");
                const newOrder = Array.from(el.children).map(it => it.dataset.id);
                if (this.sortCat) {
                    this.blocksOrder[this.sortCat] = newOrder;
                    await this.saveConfig();
                    alert("Đã lưu thứ tự cho " + this.sortCat);
                }
            },

            async loginAdmin() {
                const p = prompt("PIN Quản trị:");
                if (!p) return;
                // Kiểm tra so khớp với dữ liệu bảo mật từ Firebase
                if (p === this.auth.pin || (this.auth.masterPin && p === this.auth.masterPin)) {
                    this.isAdmin = true;
                    localStorage.setItem('adminAuthenticated', 'true');
                } else {
                    alert("Sai mã PIN!");
                }
            },

            async updatePIN() { 
                if(!this.newPinInput) return alert("Nhập PIN!"); 
                await this.db.collection("config").doc("auth_v1").update({ pin: this.newPinInput }); 
                alert("Thành công!"); 
                this.newPinInput = ''; 
            },

            addNewCategory() { if(this.newCatName) { this.categories.push(this.newCatName); this.blocks[this.newCatName] = ['Mặc định']; this.catGroups[this.newCatName] = 'CIP'; this.saveConfig(); this.newCatName = ''; } },
            deleteCategory(name) { if(confirm(`Xóa ${name}?`)) { this.categories = this.categories.filter(c => c !== name); this.saveConfig(); } },
            addNewBlockAt(cat) { const el = document.getElementById('new-block-'+cat); const val = el.value.trim(); if(!val) return; if(!this.blocks[cat]) this.blocks[cat] = []; this.blocks[cat].push(val); this.saveConfig(); el.value = ''; },
            deleteBlockAt(cat, blockName) { if(confirm(`Xóa ${blockName}?`)) { this.blocks[cat] = this.blocks[cat].filter(b => b !== blockName); this.saveConfig(); } },
            
            async saveConfig() { 
                // Sử dụng update để tránh ghi đè toàn bộ hoặc set với giá trị mặc định để tránh lỗi undefined
                await this.db.collection("config").doc("master_structure_v29").set({ 
                    categories: this.categories || [], 
                    blocks: this.blocks || {}, 
                    catGroups: this.catGroups || {}, 
                    blocksOrder: this.blocksOrder || {} 
                }); 
            },

            async updatePersonnelOrder(el) { const batch = this.db.batch(); Array.from(el.children).forEach((it, idx) => { if(it.dataset.id) batch.update(this.db.collection("personnel_v8").doc(it.dataset.id), { order: idx }); }); await batch.commit(); },
            editPersonnel(p) { this.editingId = p.id; this.form = { ...p }; },
            resetForm() { this.editingId = null; this.form = { name: '', mainRole: '', partyRole: '', category: this.categories[0], block: this.blocks[this.categories[0]][0], type: 'Giữ nguyên', img: '', dob: '', hometown: '', ethnic: 'Kinh', education: '', roles: '', bio: '' }; },
            
            async savePersonnel() { 
                if(!this.form.name) return alert("Họ tên bắt buộc!"); 
                if(!this.form.block) this.form.block = this.blocks[this.form.category][0];
                if(this.editingId) await this.db.collection("personnel_v8").doc(this.editingId).update(this.form); 
                else { await this.db.collection("personnel_v8").add({...this.form, order: this.data.length}); } 
                this.resetForm(); 
                alert("Đã lưu!"); 
            },

            deletePersonnel(id) { if(confirm("Xác nhận xóa?")) this.db.collection("personnel_v8").doc(id).delete(); },
            toggleTab(cat) { this.openTabs[cat] = !this.openTabs[cat]; },
            get filteredCategories() { return this.categories.filter(c => (this.catGroups[c] || 'CIP') === this.activeGroup); },
            getCategoryOfBlock(group, block) { const sample = this.data.find(p => (this.catGroups[p.category] || 'CIP') === group && p.block === block); return sample ? sample.category : 'Vị trí'; },
            
            dataFilteredAll() {
    // 1. Lọc theo nhóm (VIP/CIP)
    let base = this.data.filter(p => (this.catGroups[p.category] || 'CIP') === this.activeGroup);
    
    // 2. Lọc theo Tab (Category) nếu không tìm kiếm
    if (this.filterCategory !== 'Tất cả' && this.search === '') {
        base = base.filter(p => p.category === this.filterCategory);
    }
    
    const s = this.search.toLowerCase();
    if (!s) return base;

    // 3. Logic tìm kiếm thông minh: Tên, Chức danh, Khối và QUÊ QUÁN
    return base.filter(p => 
    (p.name && p.name.toLowerCase().includes(s)) || 
    (p.mainRole && p.mainRole.toLowerCase().includes(s)) || 
    (p.hometown && p.hometown.toLowerCase().includes(s)) || // Tìm theo quê quán
    (p.partyRole && p.partyRole.toLowerCase().includes(s)) || // Tìm theo chức danh Đảng
    (p.block && p.block.toLowerCase().includes(s))
);
},

            setActiveGroup(g) { this.activeGroup = g; this.filterCategory = 'Tất cả'; this.search = ''; },
            hasPeopleInGroup(g) { return this.dataFilteredAll().some(p => (this.catGroups[p.category] || 'CIP') === g); },
            getPeopleInDB(cat, block) { return this.data.filter(p => p.category === cat && p.block === block); },
            getPeopleByGroupAndBlock(g, b) { return this.dataFilteredAll().filter(p => (this.catGroups[p.category] || 'CIP') === g && p.block === b); },
            
            blocksOrderFilteredByGroup(group) {
                const activeBlocks = [...new Set(this.dataFilteredAll().filter(p => (this.catGroups[p.category] || 'CIP') === group).map(it => it.block))];
                const savedOrder = this.blocksOrder[this.filterCategory] || [];
                return savedOrder.filter(b => activeBlocks.includes(b)).concat(activeBlocks.filter(b => !savedOrder.includes(b)));
            },

            getImgUrl(u) { 
                if(!u) return 'https://via.placeholder.com/400x533'; 
                const d = u.match(/[-\w]{25,}/); 
                return d ? `https://lh3.googleusercontent.com/d/${d[0]}=s800` : u; 
            },

            formatList(t) { return t ? t.split('\n').filter(l => l.trim()).map(l => `<li>• ${l}</li>`).join('') : ''; }
        }
    }
</script>

    <footer x-show="!isAdmin" class="w-full py-8 mt-auto">
        <div class="container mx-auto px-4">
            <div class="flex flex-col items-center justify-center opacity-40 hover:opacity-100 transition-opacity duration-500">
                <div class="h-px w-16 bg-slate-300 mb-4"></div>
                <p class="text-[10px] font-medium text-slate-500 tracking-[0.3em] uppercase mb-1">Developed & managed by</p>
                <p class="text-[12px] font-black text-slate-600 tracking-tighter uppercase italic">Nhung Tran <span class="mx-2 text-slate-300">|</span> © 2026 VIAGS</p>
            </div>
        </div>
    </footer>
</body>
</html>
