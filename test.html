<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP/CIP TOOL - MULTI POSITIONS</title>
    <link rel="icon" href="pvhl-tool.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script defer src="https://unpkg.com/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root { --brand: #1FA3B0; --highlight: #FB8500; --bg-main: #E0F2FE; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: #1e293b; overflow-x: hidden; }
        [x-cloak] { display: none !important; }
        .tag-cat-name { background: var(--brand); color: white; padding: 4px 12px; border-radius: 99px 0 0 99px; font-size: 10px; font-weight: 900; text-transform: uppercase; border-right: 1px solid rgba(255,255,255,0.3); }
        .tag-block-name { background: #E11D48; color: white; padding: 4px 12px; border-radius: 0 99px 99px 0; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .scroll-admin-db { max-height: calc(100vh - 180px); overflow-y: auto; }
        .input-admin { border: 2px solid #E2E8F0; border-radius: 12px; padding: 10px 15px; width: 100%; font-weight: 700; color: #000; background: white; outline: none; }
        .db-row { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 10px; }
    </style>
</head>
<body x-data="app()" x-init="init()">

    <div x-show="!isAdmin">
        </div>

    <div x-show="isAdmin" x-cloak class="fixed inset-0 z-[100] flex flex-col lg:flex-row bg-[#F1F5F9] overflow-hidden text-black" x-data="{ mobileMenu: false }">
        
        <button @click="mobileMenu = true" class="lg:hidden fixed bottom-6 right-6 z-[160] bg-[#1FA3B0] text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-2xl">⚙️</button>

        <aside :class="mobileMenu ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'" class="fixed lg:relative z-[155] w-72 h-full bg-[#0F172A] text-white flex flex-col transition-transform duration-300 shadow-2xl shrink-0">
            <div class="p-6 text-center border-b border-white/10 relative">
                <button @click="mobileMenu = false" class="lg:hidden absolute top-4 right-4 text-white/50 text-xl">✕</button>
                <img src="viags.png" class="h-10 mx-auto mb-3">
                <h2 class="font-black text-lg text-[#1FA3B0] uppercase italic">QUẢN TRỊ VIÊN</h2>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-6">
                <button @click="isAdmin = false; mobileMenu = false" class="w-full bg-[#FB8500] text-white py-3 rounded-xl font-black text-[11px] uppercase flex items-center justify-center gap-2">🏠 Về Trang chủ</button>
                </div>
            <button @click="logoutAdmin()" class="p-4 bg-red-600/20 text-red-500 font-black text-[10px] uppercase">Đăng xuất</button>
        </aside>

        <main class="flex-1 overflow-y-auto p-3 md:p-8 no-scrollbar">
            <div class="grid grid-cols-1 xl:grid-cols-2 gap-6 items-start">
                
                <div class="bg-white p-5 md:p-8 rounded-[2rem] border shadow-xl">
                    <h3 class="font-black text-brand text-xl uppercase mb-6 border-l-8 border-brand pl-4">Hồ sơ Nhân sự</h3>
                    
                    <div class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="text" x-model="form.name" class="input-admin" placeholder="Họ tên *">
                            <input type="text" x-model="form.mainRole" class="input-admin" placeholder="Chức danh hiển thị *">
                        </div>

                        <div class="bg-slate-50 p-4 rounded-2xl border-2 border-dashed border-slate-200">
                            <label class="text-[10px] font-black text-brand uppercase mb-2 block">Lọc theo loại khối:</label>
                            <div class="grid grid-cols-2 gap-2">
                                <button @click="form.filterType = 'VIP'" :class="form.filterType === 'VIP' ? 'bg-[#E11D48] text-white' : 'bg-white text-slate-400'" class="py-2 rounded-lg font-black text-xs transition-all border">VIP</button>
                                <button @click="form.filterType = 'CIP'" :class="form.filterType === 'CIP' ? 'bg-[#1FA3B0] text-white' : 'bg-white text-slate-400'" class="py-2 rounded-lg font-black text-xs transition-all border">CIP</button>
                            </div>
                        </div>

                        <div class="space-y-3">
                            <label class="text-[10px] font-black text-slate-500 uppercase ml-2">Phân bổ vị trí & khối:</label>
                            
                            <template x-for="(pos, index) in form.positions" :key="index">
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-2 p-3 bg-slate-50 rounded-xl border" 
                                     x-show="index === 0 || (form.positions[index-1].category && form.positions[index-1].block)">
                                    <div class="flex flex-col gap-1">
                                        <span class="text-[8px] font-black text-slate-400 uppercase ml-1" x-text="'Vị trí ' + (index + 1)"></span>
                                        <select x-model="pos.category" @change="pos.block = ''" class="input-admin !py-2 text-xs">
                                            <option value="">-- Chọn Vị trí --</option>
                                            <template x-for="cat in categories.filter(c => catGroups[c] === form.filterType)" :key="cat">
                                                <option :value="cat" x-text="cat"></option>
                                            </template>
                                        </select>
                                    </div>
                                    <div class="flex flex-col gap-1">
                                        <span class="text-[8px] font-black text-slate-400 uppercase ml-1">Thuộc Khối</span>
                                        <select x-model="pos.block" class="input-admin !py-2 text-xs">
                                            <option value="">-- Chọn Khối --</option>
                                            <template x-for="b in (blocks[pos.category] || [])" :key="b">
                                                <option :value="b" x-text="b"></option>
                                            </template>
                                        </select>
                                    </div>
                                </div>
                            </template>
                        </div>

                        <input type="text" x-model="form.partyRole" class="input-admin !text-[#FB8500]" placeholder="Chức danh Đảng (nếu có)">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" x-model="form.dob" class="input-admin text-sm" placeholder="Ngày sinh">
                            <input type="text" x-model="form.hometown" class="input-admin text-sm" placeholder="Quê quán">
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <select x-model="form.type" class="input-admin text-xs"><template x-for="t in types" :key="t"><option :value="t" x-text="t"></option></template></select>
                            <input type="text" x-model="form.img" class="input-admin text-xs" placeholder="Google Drive ID Ảnh">
                        </div>
                        <textarea x-model="form.roles" class="input-admin h-24 text-sm" placeholder="Danh sách chức vụ công tác..."></textarea>
                        <textarea x-model="form.bio" class="input-admin h-32 text-sm font-medium italic" placeholder="Tiểu sử tóm tắt..."></textarea>
                    </div>

                    <button @click="savePersonnel()" class="w-full mt-8 bg-[#1FA3B0] text-white py-5 rounded-2xl font-black shadow-lg uppercase tracking-widest hover:brightness-110 transition-all">Lưu hồ sơ nhân sự</button>
                    <button x-show="editingId" @click="resetForm()" class="w-full mt-3 bg-slate-100 text-slate-500 py-3 rounded-xl font-bold uppercase text-[10px]">Hủy chỉnh sửa</button>
                </div>

                <div class="bg-white p-5 md:p-8 rounded-[2rem] border shadow-xl flex flex-col h-full max-h-[85vh]">
                    </div>
            </div>
        </main>
    </div>

    <script>
    function app() {
        return {
            isAdmin: false, 
            adminSearch: '',
            categories: [], 
            blocks: {}, 
            catGroups: {}, 
            data: [],
            types: ['Giữ nguyên', 'Tái cử', 'Lần đầu'],
            
            // Cấu trúc Form mới hỗ trợ Đa vị trí
            form: { 
                name: '', mainRole: '', partyRole: '', type: 'Giữ nguyên', img: '', 
                dob: '', hometown: '', ethnic: 'Kinh', education: '', roles: '', bio: '',
                filterType: 'VIP', // Khóa lọc VIP/CIP
                positions: [
                    { category: '', block: '' }, // Vị trí 1
                    { category: '', block: '' }, // Vị trí 2 (ẩn cho đến khi Vị trí 1 xong)
                    { category: '', block: '' }  // Vị trí 3
                ]
            },

            adminEmails: ["luongbinhan@gmail.com", "pvhl.nba@gmail.com", "trannhung200677@gmail.com"],

            async init() {
                // Initialize Firebase tương tự như code của bạn
                // ...
            },

            // Cập nhật hàm Lưu để xử lý đa vị trí
            async savePersonnel() { 
                if(!this.form.name) return alert("Họ tên bắt buộc!"); 
                
                // Lọc bỏ các vị trí trống trước khi lưu
                const validPositions = this.form.positions.filter(p => p.category && p.block);
                if(validPositions.length === 0) return alert("Vui lòng chọn ít nhất 1 Vị trí và Khối!");

                // Lưu dữ liệu vào Firebase (Bạn có thể chọn lưu mảng positions hoặc 
                // tạo nhiều bản ghi ảo nếu muốn hiện ở nhiều nơi đồng thời)
                const payload = { 
                    ...this.form, 
                    category: validPositions[0].category, // Giữ lại cho tương thích code cũ
                    block: validPositions[0].block,
                    allPositions: validPositions // Mảng mới phục vụ logic đa điểm
                };

                if(this.editingId) await this.db.collection("personnel_v8").doc(this.editingId).update(payload); 
                else { await this.db.collection("personnel_v8").add({...payload, order: this.data.length}); } 
                
                this.resetForm(); alert("Đã cập nhật hệ thống!"); 
            },

            resetForm() { 
                this.editingId = null; 
                this.form = { 
                    name: '', mainRole: '', partyRole: '', type: 'Giữ nguyên', img: '', dob: '', hometown: '', ethnic: 'Kinh', education: '', roles: '', bio: '',
                    filterType: 'VIP',
                    positions: [{ category: '', block: '' }, { category: '', block: '' }, { category: '', block: '' }]
                }; 
            },

            // Các hàm login, logout, getImgUrl, reinitSortables... giữ nguyên
            getImgUrl(u) { 
                if(!u) return 'https://placehold.co/400x533?text=No+Image'; 
                const d = u.match(/[-\w]{25,}/); 
                return d ? `https://lh3.googleusercontent.com/d/$$${d[0]}` : u; 
            },
            
            // Logic hiển thị của bạn
            getPeopleInDB(cat, block) { 
                return this.data.filter(p => {
                    // Hiện ở vị trí chính hoặc bất kỳ vị trí phụ nào
                    if(p.category === cat && p.block === block) return true;
                    if(p.allPositions) return p.allPositions.some(pos => pos.category === cat && pos.block === block);
                    return false;
                });
            }
        }
    }
    </script>
</body>
</html>
