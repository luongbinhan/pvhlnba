<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP/CIP TOOL - ADMIN MOBILE OPTIMIZED</title>
    <link rel="icon" href="pvhl-tool.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script defer src="https://unpkg.com/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root { --brand: #1FA3B0; --highlight: #FB8500; --bg-main: #E0F2FE; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: #1e293b; overflow-x: hidden; }
        [x-cloak] { display: none !important; }
        b, strong, .font-bold { font-weight: 900 !important; }
        .tag-cat-name { background: var(--brand); color: white; padding: 4px 12px; border-radius: 99px 0 0 99px; font-size: 10px; font-weight: 900; text-transform: uppercase; border-right: 1px solid rgba(255,255,255,0.3); }
        .tag-block-name { background: #E11D48; color: white; padding: 4px 12px; border-radius: 0 99px 99px 0; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .search-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(225, 29, 72, 0.9); backdrop-blur: 4px; padding: 4px; text-align: center; z-index: 5; }
        .modal-container { background: white; border-radius: 24px; width: 95%; max-width: 900px; max-height: 85vh; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .modal-body-scroll { overflow-y: auto; flex: 1; padding-bottom: 40px; }
        .img-profile-mini { display: block; object-fit: cover; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border: 4px solid white; z-index: 10; }
        .scroll-admin-db { max-height: calc(100vh - 180px); overflow-y: auto; padding-right: 5px; }
        .scroll-admin-db::-webkit-scrollbar { width: 4px; }
        .scroll-admin-db::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        .badge-taicu { position: absolute; bottom: 0; right: 0; width: 25px; height: 25px; background: #FFD700; border-radius: 100% 0 0 0; display: flex; align-items: flex-end; justify-content: flex-end; z-index: 20; }
        .badge-taicu::after { content: '★'; color: #E11D48; font-size: 16px; margin-right: 2px; margin-bottom: 1px; }
        .person-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; z-index: 1; border: 1px solid #cbd5e1; background: white; border-radius: 12px; overflow: hidden; cursor: pointer; }
        .person-card:hover { z-index: 10 !important; transform: translateY(-10px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .input-admin { border: 2px solid #E2E8F0; border-radius: 12px; padding: 10px 15px; width: 100%; font-weight: 700; color: #000; background: white; outline: none; transition: border-color 0.2s; }
        .input-admin:focus { border-color: var(--brand); }
        .db-row { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 10px; transition: 0.2s; color: #000; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Mobile Side Navigation Overlay */
        .admin-sidebar-mobile { position: fixed; inset: 0; z-index: 150; background: rgba(15, 23, 42, 0.5); backdrop-blur: 4px; }
    </style>
</head>
<body x-data="app()" x-init="init()">

    <div x-show="!isAdmin">
        <header class="sticky top-0 z-50 bg-[#1FA3B0] shadow-xl border-b-4 border-[#FB8500]">
            <div class="container mx-auto px-4 flex justify-between items-center py-2 md:py-3">
                <img src="viags.png" class="h-8 md:h-10 w-auto"> 
                <div class="flex-1 max-w-xl mx-2 md:mx-6 relative text-black">
                    <input type="text" x-model="search" placeholder="Tìm tên, khối..." class="w-full bg-white rounded-full px-10 py-2 md:py-2.5 font-bold outline-none text-sm shadow-inner">
                    <span class="absolute left-3 top-2 md:top-3">🔍</span>
                </div>
                <button @click="loginAdmin()" class="bg-red-600 text-white px-3 md:px-5 py-1.5 md:py-2 rounded-full text-[10px] md:text-xs font-black hover:bg-red-700 uppercase">Admin</button>
            </div>
        </header>

        <div class="flex min-h-screen">
            <aside class="hidden lg:block w-72 p-6 border-r border-blue-200 bg-white/30 backdrop-blur-md text-black">
                <div class="sticky top-28">
                    <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6 text-center">Thống kê dữ liệu</h3>
                    <div class="space-y-4 overflow-y-auto max-h-[70vh] no-scrollbar">
                        <template x-for="cat in categories" :key="cat">
                            <div class="mb-4">
                                <p class="text-[10px] font-black text-[#1FA3B0] uppercase mb-2" x-text="cat"></p>
                                <template x-for="block in (blocks[cat] || [])" :key="block">
                                    <div class="bg-white p-2 rounded-lg flex justify-between items-center mb-1 shadow-sm border-l-4 border-brand">
                                        <span class="text-[9px] font-bold text-slate-500 uppercase truncate pr-2" x-text="block"></span>
                                        <span class="text-xs font-black text-red-500" x-text="getPeopleInDB(cat, block).length"></span>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>
            </aside>

            <main class="flex-1 p-4 md:p-10">
                <div class="grid grid-cols-2 gap-3 mb-6 max-w-sm mx-auto md:mx-0">
                    <button @click="setActiveGroup('VIP')" :class="activeGroup === 'VIP' ? 'bg-[#E11D48] scale-105 shadow-lg' : 'bg-slate-800 opacity-50'" class="py-2.5 rounded-xl text-white font-black text-xs uppercase transition-all">VIP</button>
                    <button @click="setActiveGroup('CIP')" :class="activeGroup === 'CIP' ? 'bg-[#1FA3B0] scale-105 shadow-lg' : 'bg-slate-800 opacity-50'" class="py-2.5 rounded-xl text-white font-black text-xs uppercase transition-all">CIP</button>
                </div>

                <div class="flex gap-2 overflow-x-auto no-scrollbar pb-3 mb-8 border-b border-white">
                    <button @click="filterCategory = 'Tất cả'" :class="filterCategory === 'Tất cả' ? 'bg-[#FB8500] text-white' : 'bg-white text-slate-500'" class="px-4 py-2 rounded-lg text-[10px] font-black uppercase whitespace-nowrap border shadow-sm">Tất cả Vị trí</button>
                    <template x-for="cat in filteredCategories" :key="cat">
                        <button @click="filterCategory = cat" :class="filterCategory === cat ? 'bg-[#FB8500] text-white' : 'bg-white text-slate-500'" class="px-4 py-2 rounded-lg text-[10px] font-black uppercase whitespace-nowrap border shadow-sm" x-text="cat"></button>
                    </template>
                </div>

                <div class="space-y-12">
                    <template x-for="groupName in [activeGroup]" :key="groupName">
                        <div x-show="hasPeopleInGroup()">
                            <template x-for="catName in (filterCategory === 'Tất cả' ? filteredCategories : [filterCategory])" :key="catName">
                                <div>
                                    <template x-for="blockName in getBlocksInOrder(catName, groupName)" :key="blockName">
                                        <div x-show="getPeopleByGroupAndBlock(groupName, blockName, catName).length > 0" class="mb-10 text-black">
                                            <div class="inline-flex mb-6 shadow-sm">
                                                <span class="tag-cat-name" x-text="catName"></span>
                                                <span class="tag-block-name" x-text="blockName"></span>
                                            </div>
                                            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 md:gap-8">
                                                <template x-for="person in getPeopleByGroupAndBlock(groupName, blockName, catName)" :key="person.id">
                                                    <div @click="selectedPerson = person" class="person-card group flex flex-col relative overflow-hidden bg-white">
                                                        <div class="aspect-[3/4.2] relative overflow-hidden bg-slate-100">
                                                            <img :src="getImgUrl(person.img)" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                                                            <div x-show="search.length > 0" class="search-overlay">
                                                                <p class="text-[8px] font-black text-white uppercase" x-text="person.category"></p>
                                                            </div>
                                                        </div>
                                                        <div class="p-2 md:p-3 text-center border-t border-slate-50 bg-white flex-grow flex flex-col justify-center text-black relative z-10">
                                                            <h5 class="text-[#E11D48] font-black text-[11px] md:text-[13px] leading-tight uppercase mb-1" x-text="person.name"></h5>
                                                            <p class="text-[8px] md:text-[9px] text-slate-500 font-bold uppercase" x-text="person.mainRole"></p>
                                                            <template x-if="person.partyRole"><p class="text-[9px] !text-[#FB8500] font-black uppercase mt-0.5" x-text="person.partyRole"></p></template>
                                                        </div>
                                                        <template x-if="person.type === 'Tái cử'"><div class="badge-taicu"></div></template>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </main>
        </div>
    </div>

    <div x-show="isAdmin" x-cloak class="fixed inset-0 z-[100] flex flex-col lg:flex-row bg-[#F1F5F9] overflow-hidden text-black" x-data="{ mobileMenu: false }">
        
        <button @click="mobileMenu = true" class="lg:hidden fixed bottom-6 right-6 z-[160] bg-[#1FA3B0] text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-2xl animate-bounce">⚙️</button>

        <aside :class="mobileMenu ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'" 
               class="fixed lg:relative z-[155] w-72 h-full bg-[#0F172A] text-white flex flex-col transition-transform duration-300 shadow-2xl shrink-0">
            
            <div class="p-6 text-center border-b border-white/10 relative">
                <button @click="mobileMenu = false" class="lg:hidden absolute top-4 right-4 text-white/50 text-xl">✕</button>
                <img src="viags.png" class="h-10 mx-auto mb-3">
                <h2 class="font-black text-lg text-brand uppercase italic">QUẢN TRỊ VIÊN</h2>
            </div>

            <div class="flex-1 overflow-y-auto p-4 space-y-6 no-scrollbar">
                <button @click="isAdmin = false; mobileMenu = false" class="w-full bg-[#FB8500] text-white py-3 rounded-xl font-black text-[11px] uppercase flex items-center justify-center gap-2">🏠 Về Trang chủ</button>

                <div class="bg-white/5 p-4 rounded-2xl border border-white/10">
                    <label class="text-[9px] font-black text-cyan-400 uppercase mb-3 block">1. Danh sách Tabs</label>
                    <div class="flex gap-1 mb-4">
                        <input type="text" x-model="newCatName" placeholder="Tên tab..." class="flex-1 bg-slate-800 border-none rounded-lg p-2 text-[10px] text-white font-bold outline-none">
                        <button @click="addNewCategory()" class="bg-brand text-white px-3 rounded-lg font-black">+</button>
                    </div>
                    <div id="sortable-tabs-admin" class="space-y-2">
                        <template x-for="cat in categories" :key="cat">
                            <div :data-id="cat" class="bg-slate-800/80 p-2 rounded-xl border border-white/5 cursor-move">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-[10px] font-black uppercase text-slate-300" x-text="cat"></span>
                                    <button @click="deleteCategory(cat)" class="text-red-400 text-xs">✕</button>
                                </div>
                                <select x-model="catGroups[cat]" @change="saveConfig()" class="w-full bg-slate-900 text-cyan-400 text-[10px] font-black border-none rounded-lg p-1.5 outline-none">
                                    <option value="VIP">VIP</option><option value="CIP">CIP</option>
                                </select>
                            </div>
                        </template>
                    </div>
                    <button @click="saveTabsOrder()" class="w-full mt-3 bg-green-600 text-white py-2 rounded-lg font-black text-[10px] uppercase">Lưu thứ tự</button>
                </div>

                <div class="bg-white/5 p-4 rounded-2xl border border-white/10">
                    <label class="text-[9px] font-black text-highlight uppercase mb-3 block">2. Thứ tự Khối nội bộ</label>
                    <select x-model="sortCat" @change="reinitSortables()" class="w-full bg-slate-800 text-white p-2 rounded-lg text-[10px] font-bold mb-4 outline-none border-none">
                        <template x-for="c in categories" :key="c"><option :value="c" x-text="c"></option></template>
                    </select>
                    <div id="sortable-blocks-admin" class="space-y-1.5">
                        <template x-for="blockName in (blocks[sortCat] || [])" :key="blockName">
                            <div :data-id="blockName" class="bg-slate-800 p-2 rounded-lg flex items-center justify-between cursor-move border border-white/5 shadow-inner">
                                <span class="text-[10px] font-black uppercase text-slate-100 truncate pr-2" x-text="blockName"></span>
                                <span class="text-slate-500 font-bold text-xs">☰</span>
                            </div>
                        </template>
                    </div>
                    <button @click="saveBlockOrder()" class="w-full mt-3 bg-[#1FA3B0] text-white py-2.5 rounded-lg font-black text-[10px] uppercase">Lưu Khối</button>
                </div>
            </div>

            <button @click="logoutAdmin()" class="p-4 bg-red-600/20 text-red-500 font-black text-[10px] uppercase hover:bg-red-600 hover:text-white transition-all">Đăng xuất hệ thống</button>
        </aside>

        <main class="flex-1 overflow-y-auto p-3 md:p-8 no-scrollbar">
            <div class="grid grid-cols-1 xl:grid-cols-2 gap-6 items-start">
                
                <div class="bg-white p-5 md:p-8 rounded-[2rem] border shadow-xl">
                    <h3 class="font-black text-brand text-xl uppercase mb-6 border-l-8 border-brand pl-4">Hồ sơ Nhân sự</h3>
                    <div class="grid grid-cols-1 gap-4">
                        <div class="space-y-4">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <input type="text" x-model="form.name" class="input-admin" placeholder="Họ tên *">
                                <input type="text" x-model="form.mainRole" class="input-admin" placeholder="Chức danh *">
                            </div>
                            <input type="text" x-model="form.partyRole" class="input-admin !text-[#FB8500]" placeholder="Chức danh Đảng">
                            <div class="grid grid-cols-2 gap-3">
                                <input type="text" x-model="form.dob" class="input-admin text-sm" placeholder="Ngày sinh">
                                <input type="text" x-model="form.hometown" class="input-admin text-sm" placeholder="Quê quán">
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <input type="text" x-model="form.ethnic" class="input-admin text-sm" placeholder="Dân tộc">
                                <input type="text" x-model="form.education" class="input-admin text-sm" placeholder="Trình độ">
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                                <div class="flex flex-col gap-1">
                                    <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Tab hiển thị</label>
                                    <select x-model="form.category" @change="form.block = (blocks[form.category] || [])[0]" class="input-admin text-xs">
                                        <template x-for="c in categories" :key="c"><option :value="c" x-text="c"></option></template>
                                    </select>
                                </div>
                                <div class="flex flex-col gap-1">
                                    <label class="text-[9px] font-black text-slate-400 uppercase ml-2">Khối nội bộ</label>
                                    <select x-model="form.block" class="input-admin text-xs">
                                        <template x-for="b in (blocks[form.category] || [])" :key="b"><option :value="b" x-text="b"></option></template>
                                    </select>
                                </div>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <select x-model="form.type" class="input-admin text-xs"><template x-for="t in types" :key="t"><option :value="t" x-text="t"></option></template></select>
                                <input type="text" x-model="form.img" class="input-admin text-xs" placeholder="Google Drive ID Ảnh">
                            </div>
                        </div>
                        <div class="space-y-4">
                            <textarea x-model="form.roles" class="input-admin h-32 text-sm" placeholder="Danh sách chức vụ (Xuống dòng cho mỗi ý)..."></textarea>
                            <textarea x-model="form.bio" class="input-admin h-40 text-sm font-medium italic" placeholder="Tiểu sử tóm tắt..."></textarea>
                        </div>
                    </div>
                    <button @click="savePersonnel()" class="w-full mt-8 bg-[#1FA3B0] text-white py-5 rounded-2xl font-black shadow-2xl uppercase tracking-widest hover:brightness-110 transition-all">Lưu hồ sơ ngay</button>
                    <button x-show="editingId" @click="resetForm()" class="w-full mt-3 bg-slate-100 text-slate-500 py-3 rounded-xl font-bold uppercase text-[10px]">Hủy chỉnh sửa</button>
                </div>

                <div class="bg-white p-5 md:p-8 rounded-[2rem] border shadow-xl flex flex-col h-full max-h-[85vh]">
                    <h3 class="font-black text-xl uppercase border-l-8 border-highlight pl-4 mb-6 shrink-0">Database Nhân sự</h3>

                    <div class="mb-6 shrink-0 relative">
                        <input type="text" x-model="adminSearch" placeholder="Tìm nhanh: Tên, chức vụ, khối..." 
                               class="w-full border-2 border-brand/20 rounded-2xl px-5 py-4 font-bold focus:border-brand outline-none shadow-inner bg-slate-50 text-black">
                        <span class="absolute right-5 top-4 opacity-30">🔍</span>
                    </div>

                    <div class="space-y-6 scroll-admin-db no-scrollbar flex-1 overflow-y-auto">
                        <template x-if="adminSearch.length > 0">
                            <div class="bg-blue-50/50 p-4 rounded-2xl border-2 border-dashed border-blue-200 mb-6">
                                <p class="text-[10px] font-black text-blue-500 uppercase mb-4 tracking-widest text-center">Kết quả tìm kiếm phù hợp</p>
                                <div class="space-y-3">
                                    <template x-for="p in data.filter(i => 
                                        i.name?.toLowerCase().includes(adminSearch.toLowerCase()) || 
                                        i.mainRole?.toLowerCase().includes(adminSearch.toLowerCase()) ||
                                        i.category?.toLowerCase().includes(adminSearch.toLowerCase()) ||
                                        i.block?.toLowerCase().includes(adminSearch.toLowerCase())
                                    )" :key="'search-'+p.id">
                                        <div class="db-row flex flex-wrap sm:flex-nowrap items-center justify-between gap-3 bg-white shadow-sm border-slate-100">
                                            <div class="flex items-center gap-4">
                                                <img :src="getImgUrl(p.img)" class="w-12 h-12 rounded-full object-cover border-2 border-brand/10">
                                                <div>
                                                    <p class="text-sm font-black text-red-600 leading-tight" x-text="p.name"></p>
                                                    <p class="text-[9px] font-bold text-slate-500 uppercase mt-1">
                                                        <span x-text="p.mainRole"></span> | <span class="text-brand" x-text="p.category"></span> - <span x-text="p.block"></span>
                                                    </p>
                                                </div>
                                            </div>
                                            <div class="flex gap-2 w-full sm:w-auto">
                                                <button @click="editPersonnel(p)" class="flex-1 sm:flex-none bg-blue-50 text-blue-600 px-4 py-2 rounded-lg font-black text-[10px] hover:bg-blue-600 hover:text-white transition-all">SỬA</button>
                                                <button @click="deletePersonnel(p.id)" class="flex-1 sm:flex-none bg-red-50 text-red-600 px-4 py-2 rounded-lg font-black text-[10px] hover:bg-red-600 hover:text-white transition-all">XÓA</button>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>

                        <div x-show="adminSearch.length === 0" class="space-y-4">
                            <template x-for="cat in categories" :key="cat">
                                <div class="p-4 md:p-6 rounded-[2rem] bg-slate-50 border border-slate-200" x-init="openTabs[cat] = true">
                                    <div class="flex justify-between items-center mb-5">
                                        <div class="flex items-center gap-3 cursor-pointer group" @click="toggleTab(cat)">
                                            <svg class="w-4 h-4 text-brand transition-transform duration-300" :class="openTabs[cat] ? 'rotate-0' : '-rotate-90'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
                                            <h4 class="font-black text-brand uppercase text-[12px]" x-text="cat"></h4>
                                        </div>
                                        <div class="flex gap-1">
                                            <input type="text" :id="'new-block-'+cat" placeholder="Khối..." class="border rounded-lg p-2 text-[10px] font-bold w-24 outline-none">
                                            <button @click="addNewBlockAt(cat)" class="bg-red-600 text-white px-3 rounded-lg font-black">+</button>
                                        </div>
                                    </div>
                                    <div x-show="openTabs[cat]" x-collapse x-cloak>
                                        <template x-for="blockName in (blocks[cat] || [])" :key="blockName">
                                            <div class="mb-8">
                                                <div class="flex justify-between items-center mb-3 px-2">
                                                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest" x-text="blockName"></p>
                                                    <button @click="deleteBlockAt(cat, blockName)" class="text-red-500 text-[8px] font-bold uppercase hover:underline">Xóa Khối</button>
                                                </div>
                                                <div :id="'sortable-db-' + cat + '-' + blockName" class="space-y-2 min-h-[40px]">
                                                    <template x-for="p in getPeopleInDB(cat, blockName)" :key="p.id">
                                                        <div :data-id="p.id" class="db-row flex items-center justify-between group shadow-sm bg-white hover:border-brand">
                                                            <div class="flex items-center gap-3">
                                                                <span class="text-slate-300 font-bold cursor-move">☰</span>
                                                                <img :src="getImgUrl(p.img)" class="w-10 h-10 rounded-full object-cover border border-slate-100">
                                                                <p class="text-[12px] font-black text-slate-700" x-text="p.name"></p>
                                                            </div>
                                                            <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-all">
                                                                <button @click="editPersonnel(p)" class="text-blue-500 font-black text-[9px] hover:underline">SỬA</button>
                                                                <button @click="deletePersonnel(p.id)" class="text-red-500 font-black text-[9px] hover:underline">XÓA</button>
                                                            </div>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div> 
            </div>
        </main>
    </div>

    <script>
    function app() {
        return {
            isAdmin: false, selectedPersonnel: null, 
            adminSearch: '',
            search: '', 
            activeGroup: 'VIP', 
            filterCategory: 'Tất cả', 
            selectedPerson: null,
            editingId: null, 
            sortCat: '', 
            newCatName: '', 
            openTabs: {},
            categories: [], 
            blocks: {}, 
            catGroups: {}, 
            blocksOrder: {}, 
            data: [], 
            types: ['Giữ nguyên', 'Tái cử', 'Lần đầu'],
            form: { name: '', mainRole: '', partyRole: '', category: '', block: '', type: 'Giữ nguyên', img: '', dob: '', hometown: '', ethnic: 'Kinh', education: '', roles: '', bio: '' },
            adminEmails: ["luongbinhan@gmail.com", "pvhl.nba@gmail.com", "trannhung200677@gmail.com"],

            async init() {
                const cfg = { 
                    apiKey: "AIzaSyAhbVR_ywdzMNnwaeKMp5rWNsT4otCF4xM", 
                    authDomain: "pvhk-d32da.firebaseapp.com",
                    projectId: "pvhk-d32da", 
                    appId: "1:974778325507:web:eda0b36711f492cb764c36" 
                };
                if (!firebase.apps.length) firebase.initializeApp(cfg);
                this.db = firebase.firestore();

                firebase.auth().onAuthStateChanged(user => {
                    if (user && this.adminEmails.includes(user.email)) {
                        console.log("Logged as Admin:", user.email);
                    } else {
                        this.isAdmin = false;
                    }
                });

                this.db.collection("personnel_v8").orderBy("order", "asc").onSnapshot(s => { 
                    this.data = s.docs.map(d => ({id: d.id, ...d.data()})); 
                    this.$nextTick(() => this.reinitSortables()); 
                });

                this.db.collection("config").doc("master_structure_v29").onSnapshot(doc => { 
                    if (doc.exists) { 
                        const d = doc.data(); 
                        this.categories = d.categories || []; 
                        this.blocks = d.blocks || {}; 
                        this.catGroups = d.catGroups || {}; 
                        this.blocksOrder = d.blocksOrder || {}; 
                        if(!this.sortCat) this.sortCat = this.categories[0]; 
                        clearTimeout(this.stTimer);
                        this.sortableTimer = setTimeout(() => { this.$nextTick(() => this.reinitSortables()); }, 150);
                    } 
                });
            },

            loginAdmin() {
                const currentUser = firebase.auth().currentUser;
                if (currentUser && this.adminEmails.includes(currentUser.email)) { this.isAdmin = true; return; }
                const provider = new firebase.auth.GoogleAuthProvider();
                provider.setCustomParameters({ prompt: 'select_account' });
                firebase.auth().signInWithPopup(provider).then((result) => {
                    if (this.adminEmails.includes(result.user.email)) { this.isAdmin = true; } 
                    else { alert("Từ chối truy cập!"); firebase.auth().signOut(); }
                });
            },

            logoutAdmin() {
                if(confirm("Đăng xuất khỏi hệ thống Admin?")) {
                    firebase.auth().signOut().then(() => { this.isAdmin = false; location.reload(); });
                }
            },

            getImgUrl(u) { 
                if(!u) return 'https://placehold.co/400x533?text=No+Image'; 
                const d = u.match(/[-\w]{25,}/); 
                return d ? `https://drive.google.com/thumbnail?id=${d[0]}&sz=w1000` : u; 
            },

            reinitSortables() {
                this.$nextTick(() => {
                    const bEl = document.getElementById('sortable-blocks-admin');
                    if(bEl) { if(bEl._sortable) bEl._sortable.destroy(); bEl._sortable = Sortable.create(bEl, { animation: 200 }); }
                    const tEl = document.getElementById('sortable-tabs-admin');
                    if(tEl) { if(tEl._sortable) tEl._sortable.destroy(); tEl._sortable = Sortable.create(tEl, { animation: 200 }); }
                    this.categories.forEach(cat => { (this.blocks[cat] || []).forEach(block => {
                        const el = document.getElementById(`sortable-db-${cat}-${block}`);
                        if(el) { if(el._sortable) el._sortable.destroy(); el._sortable = Sortable.create(el, { animation: 200, handle: '.db-row', onEnd: async () => { await this.updatePersonnelOrder(el) } }); }
                    }); });
                });
            },

            async saveTabsOrder() {
                const el = document.getElementById('sortable-tabs-admin'); if (!el) return;
                const newOrder = Array.from(el.children).map(it => it.dataset.id).filter(id => id);
                this.categories = newOrder; await this.saveConfig(); alert("Đã cập nhật!");
            },

            async saveBlockOrder() {
                const el = document.getElementById('sortable-blocks-admin'); if (!el) return;
                const newOrder = Array.from(el.children).map(it => it.dataset.id).filter(id => id);
                if (this.sortCat) { this.blocksOrder[this.sortCat] = newOrder; this.blocks[this.sortCat] = newOrder; await this.saveConfig(); alert("Đã lưu!"); }
            },

            getBlocksInOrder(catName, groupName) {
                const activeBlocks = [...new Set(this.dataFilteredAll().filter(p => p.category === catName).map(it => it.block))];
                const savedOrder = this.blocksOrder[catName] || this.blocks[catName] || [];
                return savedOrder.filter(b => activeBlocks.includes(b)).concat(activeBlocks.filter(b => !savedOrder.includes(b)));
            },

            getPeopleByGroupAndBlock(g, b, cat) { return this.dataFilteredAll().filter(p => (this.catGroups[p.category] || 'CIP') === g && p.block === b && p.category === cat); },
            async saveConfig() { await this.db.collection("config").doc("master_structure_v29").set({ categories: this.categories, blocks: this.blocks, catGroups: this.catGroups, blocksOrder: this.blocksOrder }); },
            async savePersonnel() { 
                if(!this.form.name) return alert("Vui lòng nhập Họ tên!"); 
                if(this.editingId) await this.db.collection("personnel_v8").doc(this.editingId).update(this.form); 
                else { await this.db.collection("personnel_v8").add({...this.form, order: this.data.length}); } 
                this.resetForm(); alert("Dữ liệu đã được lưu!"); 
            },
            editPersonnel(p) { this.editingId = p.id; this.form = { ...p }; window.scrollTo({top: 0, behavior: 'smooth'}); },
            resetForm() { this.editingId = null; this.form = { name: '', mainRole: '', partyRole: '', category: this.categories[0], block: (this.blocks[this.categories[0]] || [])[0], type: 'Giữ nguyên', img: '', dob: '', hometown: '', ethnic: 'Kinh', education: '', roles: '', bio: '' }; },
            deletePersonnel(id) { if(confirm("Bạn có chắc chắn muốn xóa hồ sơ này?")) this.db.collection("personnel_v8").doc(id).delete(); },
            addNewCategory() { if(this.newCatName) { this.categories.push(this.newCatName); this.blocks[this.newCatName] = ['Mặc định']; this.catGroups[this.newCatName] = 'CIP'; this.saveConfig(); this.newCatName = ''; } },
            deleteCategory(name) { if(confirm(`Xóa hoàn toàn Tab ${name}?`)) { this.categories = this.categories.filter(c => c !== name); this.saveConfig(); } },
            addNewBlockAt(cat) { const el = document.getElementById('new-block-'+cat); const val = el.value.trim(); if(!val) return; if(!this.blocks[cat]) this.blocks[cat] = []; this.blocks[cat].push(val); this.saveConfig(); el.value = ''; },
            deleteBlockAt(cat, blockName) { if(confirm(`Xóa khối ${blockName}?`)) { this.blocks[cat] = this.blocks[cat].filter(b => b !== blockName); this.saveConfig(); } },
            toggleTab(cat) { this.openTabs[cat] = !this.openTabs[cat]; },
            formatList(t) { return t ? t.split('\n').filter(l => l.trim()).map(l => `<li>• ${l}</li>`).join('') : ''; },
            
            dataFilteredAll() {
                let d = this.data;
                if(this.filterCategory !== 'Tất cả') {
                    d = d.filter(p => {
                        if (p.category === this.filterCategory) return true;
                        if (p.allPositions && p.allPositions.some(pos => pos.category === this.filterCategory)) return true;
                        return false;
                    });
                }
                if(!this.search) return d;
                const s = this.search.toLowerCase();
                return d.filter(p => 
                    p.name.toLowerCase().includes(s) || 
                    (p.mainRole && p.mainRole.toLowerCase().includes(s)) ||
                    (p.partyRole && p.partyRole.toLowerCase().includes(s))
                );
            },

            setActiveGroup(g) { this.activeGroup = g; this.filterCategory = 'Tất cả'; this.search = ''; },
            hasPeopleInGroup() { return this.dataFilteredAll().length > 0; },
            getPeopleInDB(cat, block) { return this.data.filter(p => p.category === cat && p.block === block); },
            async updatePersonnelOrder(el) { const batch = this.db.batch(); Array.from(el.children).forEach((it, idx) => { if(it.dataset.id) batch.update(this.db.collection("personnel_v8").doc(it.dataset.id), { order: idx }); }); await batch.commit(); },
            get filteredCategories() { return this.categories.filter(c => (this.catGroups[c] || 'CIP') === this.activeGroup); }
        }
    }
    </script>

    <footer x-show="!isAdmin" class="w-full py-8 mt-auto">
        <div class="container mx-auto px-4 text-center">
            <div class="opacity-40 hover:opacity-100 transition-opacity duration-500">
                <div class="h-px w-16 bg-slate-300 mx-auto mb-4"></div>
                <p class="text-[10px] font-medium text-slate-500 tracking-[0.3em] uppercase mb-1">Developed & managed by</p>
                <p class="text-[12px] font-black text-slate-600 tracking-tighter uppercase italic">Nhung Tran | © 2026 VIAGS</p>
            </div>
        </div>
    </footer>
</body>
</html>
