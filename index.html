<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP/CIP TOOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --brand: #1FA3B0; --highlight: #FFB703; --bg-main: #F0F9FF; --dark-blue: #0E3F60; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: #1e293b; overflow-x: hidden; font-weight: 400; }
        b, strong, .font-bold { font-weight: 900 !important; }
        [x-cloak] { display: none !important; }
        
        /* HEADER */
        .header-slim { background-color: var(--brand); border-bottom: 2px solid var(--highlight); padding: 0.4rem 0; }
        
        /* MENU NHÓM - CHỮ ĐEN */
        .group-btn { padding: 10px 24px; border-radius: 14px; font-size: 13px; font-weight: 900; text-transform: uppercase; color: #000 !important; transition: 0.3s; border: 2.5px solid transparent; cursor: pointer; }
        .group-btn.active { border-color: black; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        /* NÚT KHỐI v33.3 - BO TRÒN HIỆN ĐẠI & XANH ĐẬM */
        .block-pill-v33 { 
            background: var(--dark-blue); 
            color: #FFFFFF !important; 
            padding: 8px 20px; 
            border-radius: 9999px; /* Bo tròn hoàn toàn */
            font-size: 11px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(14, 63, 96, 0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* MODAL DETAIL - TÊN ĐỎ ĐẬM */
        .modal-precision { background: white; border-radius: 12px; border: 1px solid #cbd5e1; box-shadow: 0 30px 60px rgba(0,0,0,0.4); width: 100%; max-width: 950px; position: relative; }
        .img-detail-top { position: absolute; top: 25px; right: 25px; width: 170px; height: auto; border-radius: 8px; border: 4px solid #f8fafc; object-fit: contain; }
        .name-power { color: #E11D48; font-weight: 900; font-size: 2.8rem; line-height: 1; text-transform: uppercase; }
.info-label, .text-slate-400 {
    color: #475569 !important; /* Màu xám đậm rõ nét */
    font-weight: 800 !important;
}
/* Màu cho tiêu đề lớn: CHỨC VỤ CÔNG TÁC, TIỂU SỬ... */
section h3 {
    color: #E11D48 !important; /* Đổi sang màu đỏ cho đồng bộ với tên */
    font-weight: 900 !important;
}

        /* ADMIN STYLE */
        .admin-sidebar { width: 320px; background: #0F172A; color: white; flex-shrink: 0; padding: 1.5rem; height: 100vh; }
        .input-admin { border: 2px solid #94A3B8; border-radius: 8px; padding: 8px 12px; width: 100%; font-weight: 700; color: #000 !important; background: white; }
        .db-row { background: white; border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 8px 12px; transition: 0.2s; cursor: move; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body x-data="app()" x-init="init()">

    <header class="header-slim sticky top-0 z-50 shadow-md" x-show="!isAdmin">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="viags.png" alt="Logo" class="h-10 w-auto">
                <h1 class="text-white font-black text-lg uppercase italic tracking-tighter">VIP/CIP TOOL</h1>
            </div>
            <div class="flex-1 max-w-md mx-6 relative">
                <input type="text" x-model="search" placeholder="Tìm tên, chức danh..." 
                    class="w-full bg-white/20 border border-white/30 rounded-full px-10 py-2 text-sm text-white placeholder-white font-bold outline-none focus:bg-white focus:text-black transition-all">
                <span class="absolute left-4 top-2 text-white/50">🔍</span>
            </div>
            <button @click="toggleAdmin()" class="bg-white/10 text-white px-4 py-1.5 rounded-full text-[10px] font-black border border-white/20 hover:bg-white hover:text-brand transition uppercase">⚙️ Quản trị</button>
        </div>
    </header>

    <div class="flex flex-col lg:flex-row min-h-screen" x-show="!isAdmin">
        <aside class="w-full lg:w-64 bg-white p-5 border-r border-blue-100 shadow-sm">
            <div class="sticky top-20">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Vị trí hiện tại</p>
                <p class="text-xl font-black text-brand uppercase whitespace-normal leading-tight mb-6" x-text="filterCategory"></p>
                <div class="space-y-2">
                    <template x-for="t in types" :key="t">
                        <div class="flex justify-between items-center p-3 rounded border bg-slate-50 border-slate-100 shadow-sm">
                            <span class="text-[9px] font-black uppercase text-slate-500" x-text="t"></span>
                            <span class="text-xl font-black text-brand" x-text="countStats('type', t)"></span>
                        </div>
                    </template>
                </div>
            </div>
        </aside>

        <main class="flex-1 p-4 md:p-8 space-y-6">
            <div class="flex flex-wrap gap-3">
                <button @click="setActiveGroup('VIP')" :class="activeGroup === 'VIP' ? 'active' : ''" class="group-btn bg-[#E11D48]">VIP</button>
                <button @click="setActiveGroup('CIP')" :class="activeGroup === 'CIP' ? 'active' : ''" class="group-btn bg-[#00aff0]">CIP</button>
                <button @click="setActiveGroup('Tất cả')" :class="activeGroup === 'Tất cả' ? 'active' : ''" class="group-btn bg-white border-slate-200">Tất cả</button>
            </div>

            <nav class="flex gap-2 overflow-x-auto no-scrollbar pb-4 border-b border-slate-100">
                <template x-for="cat in filteredCategories" :key="cat">
                    <button @click="filterCategory = cat" 
                        :class="filterCategory === cat ? 'bg-[#FB8500] text-white font-black shadow-lg border-2 border-[#FB8500]' : 'bg-white text-[#FB8500] border-2 border-[#FB8500] font-bold'"
                        class="tab-btn-slim whitespace-nowrap px-4 py-2 rounded-lg text-[11px] font-bold uppercase transition-all" x-text="cat"></button>
                </template>
            </nav>

            <div class="space-y-16">
                <template x-for="groupName in ['VIP', 'CIP']" :key="groupName">
                    <div x-show="hasPeopleInGroup(groupName)" class="space-y-8">
                        <div class="flex items-center gap-3">
                            <span class="px-4 py-1 rounded-full bg-slate-800 text-[10px] font-black text-white uppercase tracking-widest" x-text="groupName"></span>
                            <div class="h-px bg-slate-200 flex-grow"></div>
                        </div>
                        <template x-for="blockName in blocksOrderFilteredByGroup(groupName)" :key="blockName">
                            <div x-show="getPeopleByGroupAndBlock(groupName, blockName).length > 0">
                                <div class="mb-6">
                                    <span class="block-pill-v33" x-text="blockName"></span>
                                </div>
                                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-7 gap-6">
                                    <template x-for="person in getPeopleByGroupAndBlock(groupName, blockName)" :key="person.id">
                                        <div @click="selectedPerson = person" class="card-person cursor-pointer group shadow-md bg-white">
                                            <div class="aspect-[3/4.2] overflow-hidden bg-slate-50"><img :src="getImgUrl(person.img)" class="w-full h-full object-cover"></div>
                                            <div class="p-3 text-center border-t"><h4 class="font-black text-slate-800 text-[13px] leading-tight uppercase" x-text="person.name"></h4><p class="text-[9px] text-brand font-bold uppercase mt-1" x-text="person.mainRole"></p></div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </div>
        </main>
    </div>

    <div x-show="selectedPerson" x-cloak class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm">
        <div @click.away="selectedPerson = null" class="modal-precision flex flex-col md:flex-row overflow-hidden animate-in zoom-in duration-200">
            <button @click="selectedPerson = null" class="absolute top-4 left-4 bg-white/80 hover:bg-red-500 hover:text-white w-10 h-10 rounded-full flex items-center justify-center font-bold text-xl border shadow-lg z-10 transition-all">✕</button>
            <img :src="getImgUrl(selectedPerson?.img)" class="img-detail-top shadow-xl md:block hidden">
            <div class="flex-1 p-8 md:p-14 overflow-y-auto max-h-[90vh] pr-4 md:pr-56">
                <div class="mb-8 border-b pb-8">
                    <p class="text-brand font-black text-[10px] uppercase tracking-[0.2em] mb-3" x-text="selectedPerson?.mainRole"></p>
                    <h2 class="name-power italic mb-8" x-text="selectedPerson?.name"></h2>
                    <div class="grid grid-cols-1 gap-y-4 text-black">
                        <template x-for="f in [['Ngày sinh','dob'],['Quê quán','hometown'],['Dân tộc','ethnic'],['Trình độ','education']]">
                            <p class="text-sm flex items-center"><span class="font-black text-slate-400 uppercase text-[9px] w-28 shrink-0" x-text="f[0]"></span> <span class="font-bold border-b border-slate-100 flex-grow" x-text="selectedPerson?.[f[1]] || '---'"></span></p>
                        </template>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-12 text-black">
                    <section><h3 class="text-xs font-black text-brand uppercase tracking-widest mb-5 border-l-4 border-highlight pl-3">Chức vụ công tác</h3><ul class="text-[13px] font-bold space-y-2 list-none" x-html="formatList(selectedPerson?.roles)"></ul></section>
                    <section><h3 class="text-xs font-black text-brand uppercase tracking-widest mb-5 border-l-4 border-highlight pl-3">Tiểu sử tóm tắt</h3><ul class="text-[13px] font-medium leading-relaxed space-y-3 italic list-none" x-html="formatList(selectedPerson?.bio)"></ul></section>
                </div>
            </div>
        </div>
    </div>

    <div x-show="isAdmin" x-cloak class="fixed inset-0 z-[100] flex bg-white overflow-hidden">
        <aside class="admin-sidebar shadow-2xl flex flex-col overflow-y-auto no-scrollbar">
            <div class="mb-8 text-center"><img src="viags.png" alt="Logo" class="h-12 mx-auto mb-3 bg-white rounded p-1"><h2 class="font-black text-xl text-brand uppercase italic">System Master</h2></div>
            <div class="space-y-6">
                <div class="admin-box bg-slate-800">
                    <label class="text-[10px] font-black text-cyan-400 uppercase mb-4 block">1. Vị trí (Tabs)</label>
                    <div class="flex gap-1 mb-4">
                        <input type="text" x-model="newCatName" placeholder="Tên tab..." class="input-admin !text-[10px] !p-2">
                        <button @click="addNewCategory()" class="bg-brand text-white px-3 rounded font-black">+</button>
                    </div>
                    <div class="space-y-1">
                        <template x-for="cat in categories" :key="cat">
                            <div class="flex flex-col bg-slate-700/50 p-2 rounded mb-1">
                                <div class="flex justify-between items-center mb-1">
                                    <span class="text-[10px] font-bold text-slate-200 uppercase truncate" x-text="cat"></span>
                                    <button @click="deleteCategory(cat)" class="text-red-400 text-xs">✕</button>
                                </div>
                                <select x-model="catGroups[cat]" @change="saveConfig()" class="bg-slate-800 text-cyan-400 text-[8px] font-black border-none rounded p-0.5 outline-none">
                                    <option value="VIP">VIP</option><option value="CIP">CIP</option>
                                </select>
                            </div>
                        </template>
                    </div>
                </div>
                <div class="admin-box bg-slate-800">
                    <label class="text-[10px] font-black text-highlight uppercase mb-4 block">2. Thứ tự Khối</label>
                    <select x-model="sortCat" class="w-full bg-white text-black p-2 rounded text-xs font-bold mb-4 outline-none">
                        <template x-for="c in categories" :key="c"><option :value="c" x-text="c"></option></template>
                    </select>
                    <div id="sortable-blocks-v33" class="space-y-1.5">
                        <template x-for="blockName in (blocks[sortCat] || [])" :key="blockName">
                            <div :data-id="blockName" class="bg-slate-700 p-2 rounded flex items-center justify-between cursor-move border border-white/5 shadow-inner">
                                <span class="text-[9px] font-black uppercase text-slate-100" x-text="blockName"></span>
                                <span class="text-slate-500 font-bold">☰</span>
                            </div>
                        </template>
                    </div>
                    <button @click="saveBlockOrder()" class="w-full mt-4 bg-highlight text-black py-2.5 rounded font-black text-[10px]">LƯU THỨ TỰ</button>
                </div>
            </div>
            <button @click="toggleAdmin()" class="mt-auto bg-red-600 text-white font-black py-4 rounded-xl text-[11px] uppercase tracking-widest shadow-xl">Đóng</button>
        </aside>

        <div class="flex-1 p-8 overflow-y-auto no-scrollbar bg-[#F1F5F9]">
            <div class="grid grid-cols-1 xl:grid-cols-2 gap-10">
                <div class="bg-white p-8 rounded-3xl border shadow-xl h-fit sticky top-0">
                    <div class="flex justify-between items-center mb-8 border-b-2 pb-4">
                        <h3 class="font-black text-brand text-xl uppercase italic">Hồ sơ nhân sự</h3>
                        <button x-show="editingId" @click="resetForm()" class="text-red-500 font-bold text-[10px] uppercase underline">Hủy sửa</button>
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                        <div class="space-y-4">
                            <input type="text" x-model="form.name" class="input-admin shadow-sm" placeholder="Họ tên *">
                            <input type="text" x-model="form.mainRole" class="input-admin shadow-sm" placeholder="Chức danh *">
                            <div class="grid grid-cols-2 gap-2">
                                <input type="text" x-model="form.dob" class="input-admin text-xs" placeholder="Ngày sinh">
                                <input type="text" x-model="form.hometown" class="input-admin text-xs" placeholder="Quê quán">
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <input type="text" x-model="form.ethnic" class="input-admin text-xs" placeholder="Dân tộc">
                                <input type="text" x-model="form.education" class="input-admin text-xs" placeholder="Trình độ">
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <select x-model="form.category" class="p-2 border rounded font-black text-[10px]"><template x-for="c in categories" :key="c"><option :value="c" x-text="c"></option></template></select>
                                <select x-model="form.block" class="p-2 border rounded font-black text-[10px]"><template x-for="b in (blocks[form.category] || [])" :key="b"><option :value="b" x-text="b"></option></template></select>
                            </div>
                            <input type="text" x-model="form.img" class="input-admin text-xs" placeholder="Google Drive ID">
                        </div>
                        <div class="space-y-4">
                            <textarea x-model="form.roles" class="input-admin h-36 text-xs font-bold" placeholder="Chức danh chi tiết..."></textarea>
                            <textarea x-model="form.bio" class="input-admin h-40 text-xs" placeholder="Tiểu sử..."></textarea>
                        </div>
                    </div>
                    <button @click="savePersonnel()" 
    class="w-full mt-10 bg-[#0E3F60] text-white py-5 rounded-2xl font-black shadow-2xl uppercase tracking-widest hover:bg-[#0A2E45] transition-all duration-300">
    LƯU HỒ SƠ MASTER
</button>
                </div>

                <div class="bg-white p-8 rounded-3xl border shadow-xl overflow-y-auto max-h-[90vh] no-scrollbar text-black">
                    <h3 class="font-black text-xl uppercase border-l-8 border-highlight pl-5 mb-10">Database Management</h3>
                    <div class="space-y-12">
                        <template x-for="cat in categories" :key="cat">
                            <div class="p-6 rounded-[2.5rem] bg-slate-50 border-2 border-white shadow-inner mb-6">
                                <div class="flex justify-between items-center mb-6 border-b pb-3">
                                    <h4 class="font-black text-brand uppercase text-[13px]" x-text="cat"></h4>
                                    <div class="flex gap-1">
                                        <input type="text" :id="'new-block-'+cat" placeholder="Khối mới..." class="border p-1.5 rounded text-[10px] font-bold w-32 outline-none">
                                        <button @click="addNewBlockAt(cat)" class="bg-highlight text-black px-3 rounded text-[12px] font-black">+</button>
                                    </div>
                                </div>
                                <template x-for="blockName in (blocks[cat] || [])" :key="blockName">
                                    <div class="mb-8">
                                        <div class="flex justify-between items-center mb-3">
                                            <p class="text-[11px] font-black text-slate-400 uppercase flex items-center gap-3"><span x-text="blockName"></span><span class="h-[1.5px] w-24 bg-slate-200"></span></p>
                                            <button @click="deleteBlockAt(cat, blockName)" class="text-red-500 text-[9px] font-bold uppercase">Xóa Khối</button>
                                        </div>
                                        <div :id="'sortable-db-' + cat + '-' + blockName" class="space-y-2 min-h-[30px] p-1">
                                            <template x-for="p in getPeopleInDB(cat, blockName)" :key="p.id">
                                                <div :data-id="p.id" class="db-row flex items-center justify-between group shadow-sm bg-white">
                                                    <div class="flex items-center gap-4">
                                                        <span class="text-slate-300 font-bold text-lg">☰</span>
                                                        <img :src="getImgUrl(p.img)" class="w-10 h-10 rounded-full object-cover">
                                                        <p class="text-[13px] font-black" x-text="p.name"></p>
                                                    </div>
                                                    <div class="flex gap-3 opacity-0 group-hover:opacity-100 transition-all">
                                                        <button @click="editPersonnel(p)" class="text-blue-500 font-black text-[10px]">Sửa</button>
                                                        <button @click="deletePersonnel(p.id)" class="text-red-500 font-black text-[10px]">Xóa</button>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function app() {
            return {
                isAdmin: false, search: '', activeGroup: 'VIP', filterCategory: 'Tất cả', selectedPerson: null,
                editingId: null, sortCat: '', newCatName: '',
                categories: ['Bộ Chính trị', 'Ban Bí thư'],
                catGroups: {}, blocks: { 'Bộ Chính trị': ['Địa phương'], 'Ban Bí thư': ['Địa phương'] },
                blocksOrder: {}, types: ['Giữ nguyên', 'Tái cử', 'Lần đầu'],
                data: [], form: { name: '', mainRole: '', order: 999, category: '', block: '', type: 'Giữ nguyên', img: '', dob: '', hometown: '', ethnic: 'Kinh', education: '', roles: '', bio: '' },
                
                async init() {
                    const cfg = { apiKey: "AIzaSyAhbVR_ywdzMNnwaeKMp5rWNsT4otCF4xM", projectId: "pvhk-d32da", appId: "1:974778325507:web:eda0b36711f492cb764c36" };
                    if (!firebase.apps.length) firebase.initializeApp(cfg); 
                    this.db = firebase.firestore();
                    
                    this.db.collection("personnel_v8").orderBy("order", "asc").onSnapshot(s => {
                        this.data = s.docs.map(d => ({id: d.id, ...d.data()}));
                        this.$nextTick(() => this.initAllSortables());
                    });

                    this.db.collection("config").doc("master_structure_v29").onSnapshot(doc => {
                        if (doc.exists && doc.data()) {
                            const d = doc.data();
                            this.categories = d.categories || this.categories;
                            this.blocks = d.blocks || this.blocks;
                            this.catGroups = d.catGroups || {};
                            this.blocksOrder = d.blocksOrder || {};
                            if(!this.sortCat) this.sortCat = this.categories[0];
                            if(!this.form.category) this.form.category = this.categories[0];
                        }
                    });
                },

                addNewCategory() { if(this.newCatName) { this.categories.push(this.newCatName); this.blocks[this.newCatName] = ['Mặc định']; this.catGroups[this.newCatName] = 'CIP'; this.saveConfig(); this.newCatName = ''; } },
                deleteCategory(name) { if(confirm(`Xóa vị trí ${name}?`)) { this.categories = this.categories.filter(c => c !== name); this.saveConfig(); } },
                addNewBlockAt(cat) {
                    const el = document.getElementById('new-block-'+cat);
                    const val = el.value.trim();
                    if(!val) return;
                    if(!this.blocks[cat]) this.blocks[cat] = [];
                    this.blocks[cat].push(val);
                    this.saveConfig(); el.value = '';
                },
                deleteBlockAt(cat, blockName) { if(confirm(`Xóa khối ${blockName}?`)) { this.blocks[cat] = this.blocks[cat].filter(b => b !== blockName); this.saveConfig(); } },
                async saveConfig() { await this.db.collection("config").doc("master_structure_v29").set({ categories: this.categories, blocks: this.blocks, catGroups: this.catGroups, blocksOrder: this.blocksOrder }); },

                initAllSortables() {
                    const blockEl = document.getElementById('sortable-blocks-v33');
                    if(blockEl && !blockEl.sortableInited) { Sortable.create(blockEl, { animation: 200, onEnd: () => this.saveBlockOrder() }); blockEl.sortableInited = true; }
                    this.categories.forEach(cat => {
                        (this.blocks[cat] || []).forEach(block => {
                            const el = document.getElementById(`sortable-db-${cat}-${block}`);
                            if(el && !el.sortableInited) {
                                Sortable.create(el, { animation: 200, handle: '.db-row', onEnd: async () => { await this.updatePersonnelOrder(el) } }); 
                                el.sortableInited = true;
                            }
                        });
                    });
                },
                async updatePersonnelOrder(el) {
                    const batch = this.db.batch();
                    Array.from(el.children).forEach((it, idx) => { if(it.dataset.id) batch.update(this.db.collection("personnel_v8").doc(it.dataset.id), { order: idx }); });
                    await batch.commit();
                },
                async saveBlockOrder() {
                    const el = document.getElementById('sortable-blocks-v33');
                    const newOrder = Array.from(el.children).map(it => it.dataset.id);
                    this.blocksOrder[this.sortCat] = newOrder; await this.saveConfig();
                },

                toggleAdmin() { this.isAdmin = !this.isAdmin; if(this.isAdmin && prompt("PIN:") !== "1234") this.isAdmin = false; },
                setActiveGroup(g) { this.activeGroup = g; this.filterCategory = 'Tất cả'; },
                get filteredCategories() { return this.activeGroup === 'Tất cả' ? this.categories : this.categories.filter(cat => this.catGroups[cat] === this.activeGroup); },
                hasPeopleInGroup(g) { return this.dataFilteredAll().some(p => (this.catGroups[p.category] || 'CIP') === g); },
                getPeopleInDB(cat, block) { return this.data.filter(p => p.category === cat && p.block === block); },
                editPersonnel(p) { this.editingId = p.id; this.form = { ...p }; },
                resetForm() { this.editingId = null; this.form = { name: '', mainRole: '', order: 999, category: this.categories[0], block: '', type: 'Giữ nguyên', img: '', dob: '', hometown: '', ethnic: 'Kinh', education: '', roles: '', bio: '' }; },
                async savePersonnel() {
                    if(!this.form.name || !this.form.mainRole) return alert("Nhập đủ thông tin!");
                    if(this.editingId) await this.db.collection("personnel_v8").doc(this.editingId).update(this.form);
                    else { this.form.order = this.data.length; await this.db.collection("personnel_v8").add(this.form); }
                    this.resetForm(); alert("Đã lưu!");
                },
                deletePersonnel(id) { if(confirm("Xóa hồ sơ?")) this.db.collection("personnel_v8").doc(id).delete(); },
                countStats(k, v) { return this.dataFilteredAll().filter(p => p[k] === v).length; },
                blocksOrderFilteredByGroup(group) {
                    const active = [...new Set(this.dataFilteredAll().filter(p => (this.catGroups[p.category] || 'CIP') === group).map(it => it.block))];
                    const defined = this.blocksOrder[this.filterCategory] || [];
                    return defined.filter(b => active.includes(b)).concat(active.filter(b => !defined.includes(b)));
                },
                getPeopleByGroupAndBlock(g, b) { return this.dataFilteredAll().filter(p => (this.catGroups[p.category] || 'CIP') === g && p.block === b); },
                dataFilteredAll() {
                    let base = this.data;
                    if (this.activeGroup !== 'Tất cả') base = base.filter(p => (this.catGroups[p.category] || 'CIP') === this.activeGroup);
                    if (this.filterCategory !== 'Tất cả') base = base.filter(p => p.category === this.filterCategory);
                    return base.filter(p => {
                        const s = this.search.toLowerCase();
                        return p.name.toLowerCase().includes(s) || p.mainRole.toLowerCase().includes(s) || (p.block && p.block.toLowerCase().includes(s)) || (p.hometown && p.hometown.toLowerCase().includes(s));
                    });
                },
                getImgUrl(u) { if(!u) return 'https://via.placeholder.com/400x533'; const d = u.match(/[-\w]{25,}/); return d ? `https://lh3.googleusercontent.com/d/${d[0]}` : u; },
                formatList(t) { return t ? t.split('\n').filter(l => l.trim() !== '').map(l => `<li>${l}</li>`).join('') : ''; }
            }
        }
    </script>
</body>
