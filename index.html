<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP/CIP TOOL</title>
    <link rel="icon" href="pvhl-tool.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
	<script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script defer src="https://unpkg.com/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>

<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root { --brand: #1FA3B0; --highlight: #FB8500; --bg-main: #E0F2FE; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: #1e293b; overflow-x: hidden; }
        [x-cloak] { display: none !important; }
        b, strong, .font-bold { font-weight: 900 !important; }
        .tag-cat-name { background: var(--brand); color: white; padding: 4px 12px; border-radius: 99px 0 0 99px; font-size: 10px; font-weight: 900; text-transform: uppercase; border-right: 1px solid rgba(255,255,255,0.3); }
        .tag-block-name { background: #E11D48; color: white; padding: 4px 12px; border-radius: 0 99px 99px 0; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .search-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(225, 29, 72, 0.9); backdrop-blur: 4px; padding: 4px; text-align: center; z-index: 5; }
        .modal-container { background: white; border-radius: 24px; width: 95%; max-width: 900px; max-height: 85vh; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .modal-body-scroll { overflow-y: auto; flex: 1; padding-bottom: 40px; }
        .img-profile-mini { display: block; object-fit: cover; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border: 4px solid white; z-index: 10; }
        .scroll-admin-db { max-height: calc(100vh - 150px); overflow-y: auto; padding-right: 10px; }
        .scroll-admin-db::-webkit-scrollbar { width: 6px; }
        .scroll-admin-db::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        .badge-taicu { position: absolute; bottom: 0; right: 0; width: 25px; height: 25px; background: #FFD700; border-radius: 100% 0 0 0; display: flex; align-items: flex-end; justify-content: flex-end; z-index: 20; }
        .badge-taicu::after { content: '★'; color: #E11D48; font-size: 16px; margin-right: 2px; margin-bottom: 1px; }
        .person-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; z-index: 1; border: 1px solid #cbd5e1; background: white; border-radius: 12px; overflow: hidden; cursor: pointer; }
        .person-card:hover { z-index: 100 !important; transform: translateY(-15px) scale(1.05); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25) !important; }
        main, .grid { isolation: isolate; }
        .person-card:hover img { transform: scale(1.1); transition: transform 0.6s ease; }
        .person-card img { transition: transform 0.6s ease; }
        @media (max-width: 767px) { .img-profile-mini { position: relative; margin: 20px auto 10px auto; width: 120px; height: 160px; } .modal-content-wrapper { padding: 20px !important; } }
        @media (min-width: 768px) { .img-profile-mini { position: absolute; top: 30px; left: 30px; width: 140px; height: 180px; margin: 0; } .modal-content-wrapper { padding: 40px 40px 40px 200px; } }
        .admin-sidebar { width: 300px; background: #0F172A; color: white; flex-shrink: 0; padding: 1.5rem; height: 100vh; overflow-y: auto; }
        .input-admin { border: 2px solid #94A3B8; border-radius: 8px; padding: 8px 12px; width: 100%; font-weight: 700; color: #000 !important; background: white; }
        .db-row { background: white; border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 8px 12px; transition: 0.2s; cursor: move; color: #000; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body x-data="app()" x-init="init()">

    <div x-show="!isAdmin">
        <header class="sticky top-0 z-50 bg-[#1FA3B0] shadow-xl border-b-4 border-[#FB8500]">
            <div class="container mx-auto px-4 flex justify-between items-center py-2 md:py-3">
                <img src="viags.png" class="h-8 md:h-10 w-auto"> 
                <div class="flex-1 max-w-xl mx-2 md:mx-6 relative text-black">
                    <input type="text" x-model="search" placeholder="Tìm tên, quê quán, khối..." class="w-full bg-white rounded-full px-10 py-2 md:py-2.5 font-bold outline-none text-sm shadow-inner">
                    <span class="absolute left-3 top-2 md:top-3">🔍</span>
                </div>
                <button @click="loginAdmin()" class="bg-red-600 text-white px-3 md:px-5 py-1.5 md:py-2 rounded-full text-[10px] md:text-xs font-black hover:bg-red-700 uppercase">Admin</button>
            </div>
        </header>

        <div class="flex min-h-screen">
            <aside class="hidden lg:block w-72 p-6 border-r border-blue-200 bg-white/30 backdrop-blur-md text-black">
                <div class="sticky top-28">
                    <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6 text-center">Thống kê dữ liệu</h3>
                    <div class="space-y-4 overflow-y-auto max-h-[70vh] no-scrollbar">
                        <template x-for="cat in categories" :key="cat">
                            <div class="mb-4">
                                <p class="text-[10px] font-black text-[#1FA3B0] uppercase mb-2" x-text="cat"></p>
                                <template x-for="block in (blocks[cat] || [])" :key="block">
                                    <div class="bg-white p-2 rounded-lg flex justify-between items-center mb-1 shadow-sm border-l-4 border-brand">
                                        <span class="text-[9px] font-bold text-slate-500 uppercase truncate pr-2" x-text="block"></span>
                                        <span class="text-xs font-black text-red-500" x-text="getPeopleInDB(cat, block).length"></span>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>
            </aside>

            <main class="flex-1 p-4 md:p-10 overflow-x-hidden">
                <div class="grid grid-cols-2 gap-3 mb-6 max-w-sm mx-auto md:mx-0">
                    <button @click="setActiveGroup('VIP')" :class="activeGroup === 'VIP' ? 'bg-[#E11D48] scale-105 shadow-lg' : 'bg-slate-800 opacity-50'" class="py-2.5 rounded-xl text-white font-black text-xs uppercase tracking-widest transition-all">VIP</button>
                    <button @click="setActiveGroup('CIP')" :class="activeGroup === 'CIP' ? 'bg-[#1FA3B0] scale-105 shadow-lg' : 'bg-slate-800 opacity-50'" class="py-2.5 rounded-xl text-white font-black text-xs uppercase tracking-widest transition-all">CIP</button>
                </div>

                <div class="flex gap-2 overflow-x-auto no-scrollbar pb-3 mb-8 border-b border-white">
                    <button @click="filterCategory = 'Tất cả'" :class="filterCategory === 'Tất cả' ? 'bg-[#FB8500] text-white' : 'bg-white text-slate-500'" class="px-4 py-2 rounded-lg text-[10px] font-black uppercase whitespace-nowrap border">Tất cả Vị trí</button>
                    <template x-for="cat in filteredCategories" :key="cat">
                        <button @click="filterCategory = cat" :class="filterCategory === cat ? 'bg-[#FB8500] text-white' : 'bg-white text-slate-500'" class="px-4 py-2 rounded-lg text-[10px] font-black uppercase whitespace-nowrap border" x-text="cat"></button>
                    </template>
                </div>

                <div class="space-y-12">
                    <template x-for="groupName in [activeGroup]" :key="groupName">
                        <div x-show="hasPeopleInGroup(groupName)">
                            <template x-for="catName in (filterCategory === 'Tất cả' ? filteredCategories : [filterCategory])" :key="catName">
                                <div>
                                    <template x-for="blockName in getBlocksInOrder(catName, groupName)" :key="blockName">
                                        <div x-show="getPeopleByGroupAndBlock(groupName, blockName, catName).length > 0" class="mb-10 text-black">
                                            <div class="inline-flex mb-6 shadow-sm">
                                                <span class="tag-cat-name" x-text="catName"></span>
                                                <span class="tag-block-name" x-text="blockName"></span>
                                            </div>
                                            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 md:gap-8">
                                                <template x-for="person in getPeopleByGroupAndBlock(groupName, blockName, catName)" :key="person.id">
                                                    <div @click="selectedPerson = person" class="person-card group flex flex-col relative overflow-hidden bg-white">
                                                        <div class="aspect-[3/4.2] relative overflow-hidden bg-slate-100">
                                                            <img :src="getImgUrl(person.img)" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                                                            <div x-show="search.length > 0" class="search-overlay">
                                                                <p class="text-[8px] font-black text-white uppercase" x-text="person.category"></p>
                                                            </div>
                                                        </div>
                                                        <div class="p-2 md:p-3 text-center border-t border-slate-50 bg-white flex-grow flex flex-col justify-center text-black relative z-10">
                                                            <h5 class="text-[#E11D48] font-black text-[11px] md:text-[13px] leading-tight uppercase mb-1" x-text="person.name"></h5>
                                                            <p class="text-[8px] md:text-[9px] text-slate-500 font-bold uppercase" x-text="person.mainRole"></p>
                                                            <template x-if="person.partyRole"><p class="text-[9px] !text-[#FB8500] font-black uppercase mt-0.5" x-text="person.partyRole"></p></template>
                                                        </div>
                                                        <template x-if="person.type === 'Tái cử'"><div class="badge-taicu"></div></template>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </main>
        </div>

        <div x-show="selectedPerson" x-cloak class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/90 backdrop-blur-sm text-black">
            <div @click.away="selectedPerson = null" class="modal-container shadow-2xl animate-in zoom-in duration-200">
                <button @click="selectedPerson = null" class="absolute top-4 right-4 bg-slate-100 w-10 h-10 rounded-full font-black text-xl hover:bg-red-500 hover:text-white transition-all z-[70]">✕</button>
                <div class="modal-body-scroll no-scrollbar">
                    <img :src="getImgUrl(selectedPerson?.img)" class="img-profile-mini">
                    <div class="modal-content-wrapper">
                        <div class="mb-6 pb-6 border-b border-slate-100">
                            <p class="text-[#1FA3B0] font-black text-[10px] md:text-xs uppercase mb-2" x-text="selectedPerson?.mainRole"></p>
                            <h2 class="text-[#E11D48] font-black text-2xl md:text-3xl uppercase italic leading-tight" x-text="selectedPerson?.name"></h2>
                            <template x-if="selectedPerson?.partyRole"><p class="!text-[#FB8500] font-black text-xs md:text-sm uppercase mt-1 mb-6" x-text="selectedPerson?.partyRole"></p></template>
                            <div class="grid grid-cols-2 gap-y-3 gap-x-6 md:gap-x-10">
                                <template x-for="f in [['Ngày sinh','dob'],['Quê quán','hometown'],['Dân tộc','ethnic'],['Trình độ','education']]">
                                    <div class="flex flex-col">
                                        <span class="text-[8px] md:text-[9px] font-black text-slate-400 uppercase" x-text="f[0]"></span>
                                        <span class="text-xs md:text-sm font-bold border-b border-slate-50" x-text="selectedPerson?.[f[1]] || '---'"></span>
                                    </div>
                                </template>
                            </div>
                        </div>
                        <div class="grid md:grid-cols-2 gap-6 md:gap-10 text-black">
                            <section>
                                <h4 class="text-[10px] md:text-[11px] font-black text-[#1FA3B0] uppercase mb-3 border-l-4 border-[#FB8500] pl-3">Chức vụ công tác</h4>
                                <ul class="text-[12px] md:text-[13px] font-bold text-slate-700 space-y-2 list-none" x-html="formatList(selectedPerson?.roles)"></ul>
                            </section>
                            <section>
                                <h4 class="text-[10px] md:text-[11px] font-black text-[#1FA3B0] uppercase mb-3 border-l-4 border-[#FB8500] pl-3">Tiểu sử tóm tắt</h4>
                                <ul class="text-[12px] md:text-[13px] font-medium text-slate-600 italic leading-relaxed space-y-3 list-none" x-html="formatList(selectedPerson?.bio)"></ul>
                            </section>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<div x-show="showLoginModal" x-cloak class="fixed inset-0 z-[200] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm">
    <div @click.away="showLoginModal = false" class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-xs border-4 border-[#1FA3B0] animate-in zoom-in duration-200">
        <h2 class="font-black text-[#1FA3B0] uppercase mb-6 text-center italic tracking-tight">Xác thực Quản trị</h2>
        
        <div class="relative mb-6" x-data="{ show: false }">
            <input :type="show ? 'text' : 'password'" 
                   x-model="loginInput" 
                   @keydown.enter="confirmLogin()"
                   placeholder="Nhập mã PIN..." 
                   class="w-full border-2 border-slate-200 rounded-xl px-4 py-3 text-center font-bold outline-none focus:border-[#1FA3B0] transition-all text-black">
            
            <button @click="show = !show" type="button" class="absolute right-3 top-3.5 text-slate-400 hover:text-[#1FA3B0]">
                <span x-text="show ? '🔒' : '👁️'"></span>
            </button>
        </div>

        <div class="flex gap-2">
            <button @click="showLoginModal = false; loginInput = ''" class="flex-1 py-3 rounded-xl font-bold bg-slate-100 text-slate-500 uppercase text-[10px]">Hủy</button>
            <button @click="confirmLogin()" class="flex-1 py-3 rounded-xl font-black bg-[#1FA3B0] text-white shadow-lg uppercase text-[10px]">Xác nhận</button>
        </div>
    </div>
</div>

    <div x-show="isAdmin" x-cloak class="fixed inset-0 z-[100] flex bg-white overflow-hidden text-black">
        <aside class="admin-sidebar shadow-2xl flex flex-col">
            <div class="mb-8 text-center"><img src="viags.png" class="h-10 mx-auto mb-3"><h2 class="font-black text-lg text-brand uppercase italic">QUẢN TRỊ VIÊN</h2></div>
            <div class="space-y-5">
                <div class="mb-5">
    <button @click="isAdmin = false" 
            class="w-full bg-[#FB8500] text-white py-3 rounded-xl font-black text-[11px] uppercase shadow-lg hover:brightness-110 transition-all flex items-center justify-center gap-2">
        <span>🏠</span> Quay về Trang chủ
    </button>
</div>

                <div class="admin-box text-white">
                    <label class="text-[9px] font-black text-cyan-400 uppercase mb-3 block">1. Tabs & Thứ tự Vị trí</label>
                    <div class="flex gap-1 mb-3">
                        <input type="text" x-model="newCatName" placeholder="Tên tab..." class="input-admin !text-[10px] !p-2 text-black">
                        <button @click="addNewCategory()" class="bg-brand text-white px-3 rounded font-black">+</button>
                    </div>
                    <div id="sortable-tabs-admin" class="space-y-1 mb-3">
                        <template x-for="cat in categories" :key="cat">
                            <div :data-id="cat" class="flex flex-col bg-slate-700/50 p-2 rounded mb-1 cursor-move">
                                <div class="flex justify-between items-center mb-1">
                                    <span class="text-[9px] font-bold text-slate-200 uppercase" x-text="cat"></span>
                                    <button @click="deleteCategory(cat)" class="text-red-400 text-xs">✕</button>
                                </div>
                                <select x-model="catGroups[cat]" @change="saveConfig()" class="bg-slate-800 text-cyan-400 text-[9px] font-black border-none rounded p-1 outline-none">
                                    <option value="VIP">VIP</option><option value="CIP">CIP</option>
                                </select>
                            </div>
                        </template>
                    </div>
                    <button @click="saveTabsOrder()" class="w-full bg-green-600 text-white py-2 rounded font-black text-[10px] uppercase">Lưu thứ tự Tabs</button>
                </div>

                <div class="admin-box text-white">
                    <label class="text-[9px] font-black text-highlight uppercase mb-3 block">2. Thứ tự Khối</label>
                    <select x-model="sortCat" @change="reinitSortables()" class="w-full bg-white text-black p-2 rounded text-[10px] font-bold mb-3">
                        <template x-for="c in categories" :key="c"><option :value="c" x-text="c"></option></template>
                    </select>
                    <div id="sortable-blocks-admin" class="space-y-1">
                        <template x-for="blockName in (blocks[sortCat] || [])" :key="blockName">
                            <div :data-id="blockName" class="bg-slate-700 p-2 rounded flex items-center justify-between cursor-move border border-white/5 shadow-inner">
                                <span class="text-[9px] font-black uppercase text-slate-100" x-text="blockName"></span>
                                <span class="text-slate-500 font-bold text-xs">☰</span>
                            </div>
                        </template>
                    </div>
                    <button @click="saveBlockOrder()" class="w-full mt-3 bg-[#1FA3B0] text-white py-2.5 rounded font-black text-[10px] uppercase hover:brightness-110 transition-all">Lưu thứ tự Khối</button>
                </div>
            </div>
            <button @click="logoutAdmin()" class="w-full mt-auto bg-red-600 text-white py-2.5 rounded font-black text-[10px] uppercase hover:bg-red-700 transition-all">Đăng xuất Admin</button>
        </aside>

        <div class="flex-1 p-5 md:p-8 overflow-y-auto bg-[#F1F5F9] no-scrollbar text-black">
            <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">
                <div class="bg-white p-6 rounded-2xl border shadow-lg h-fit sticky top-0">
                    <h3 class="font-black text-brand text-lg uppercase mb-6 border-b pb-3">Hồ sơ Nhân sự</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-3">
                            <input type="text" x-model="form.name" class="input-admin text-xs" placeholder="Họ tên *">
                            <input type="text" x-model="form.mainRole" class="input-admin text-xs" placeholder="Chức danh *">
                            <input type="text" x-model="form.partyRole" class="input-admin text-xs font-bold" placeholder="Chức danh Đảng">
                            <div class="grid grid-cols-2 gap-2"><input type="text" x-model="form.dob" class="input-admin text-xs" placeholder="Ngày sinh"><input type="text" x-model="form.hometown" class="input-admin text-xs" placeholder="Quê quán"></div>
                            <div class="grid grid-cols-2 gap-2"><input type="text" x-model="form.ethnic" class="input-admin text-xs" placeholder="Dân tộc"><input type="text" x-model="form.education" class="input-admin text-xs" placeholder="Trình độ"></div>
                            <div class="grid grid-cols-2 gap-2 text-black">
                                <select x-model="form.category" @change="form.block = blocks[form.category][0]" class="p-2 border rounded font-black text-[9px]"><template x-for="c in categories" :key="c"><option :value="c" x-text="c"></option></template></select>
                                <select x-model="form.block" class="p-2 border rounded font-black text-[9px]"><template x-for="b in (blocks[form.category] || [])" :key="b"><option :value="b" x-text="b"></option></template></select>
                            </div>
                            <select x-model="form.type" class="p-2 border rounded font-black text-[9px] w-full bg-white text-black"><template x-for="t in types" :key="t"><option :value="t" x-text="t"></option></template></select>
                            <input type="text" x-model="form.img" class="input-admin text-xs" placeholder="Drive Image ID">
                        </div>
                        <div class="space-y-3 text-black"><textarea x-model="form.roles" class="input-admin h-28 text-xs font-bold" placeholder="Chức vụ..."></textarea><textarea x-model="form.bio" class="input-admin h-32 text-xs" placeholder="Tiểu sử..."></textarea></div>
                    </div>
                    <button @click="savePersonnel()" class="w-full mt-6 bg-[#1FA3B0] text-white py-4 rounded-xl font-black shadow-lg uppercase text-xs">Lưu hồ sơ</button>
                </div>

                <div class="bg-white p-8 rounded-3xl border shadow-xl flex flex-col text-black h-full max-h-[85vh]">
                    <h3 class="font-black text-xl uppercase border-l-8 border-highlight pl-5 mb-10 shrink-0">DATABASE</h3>
                    <div class="space-y-12 scroll-admin-db no-scrollbar flex-1 overflow-y-auto">
                        <template x-for="cat in categories" :key="cat">
    <div class="p-6 rounded-[2.5rem] bg-slate-50 border-2 border-white mb-6" x-init="openTabs[cat] = true"> 
        
        <div class="flex justify-between items-center mb-6 border-b pb-3">
            <div class="flex items-center gap-3 cursor-pointer group" @click="toggleTab(cat)">
                <svg class="w-5 h-5 transition-transform duration-300" 
                     :class="openTabs[cat] ? 'rotate-0' : '-rotate-90'" 
                     fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path>
                </svg>
                <h4 class="font-black text-brand uppercase text-[13px] group-hover:text-highlight" x-text="cat"></h4>
            </div>

            <div class="flex gap-1">
                <input type="text" :id="'new-block-'+cat" placeholder="Khối..." class="border p-1.5 rounded text-[10px] font-bold w-32 outline-none">
                <button @click="addNewBlockAt(cat)" class="bg-red-600 text-white px-3 rounded text-[12px] font-black">+</button>
            </div>
        </div>

        <div x-show="openTabs[cat]" x-collapse x-cloak>
            <template x-for="blockName in (blocks[cat] || [])" :key="blockName">
                <div class="mb-8">
                    <div class="flex justify-between items-center mb-3">
                        <p class="text-[11px] font-black text-slate-400 uppercase" x-text="blockName"></p>
                        <button @click="deleteBlockAt(cat, blockName)" class="text-red-500 text-[9px] font-bold uppercase">Xóa Khối</button>
                    </div>
                    <div :id="'sortable-db-' + cat + '-' + blockName" class="space-y-2 min-h-[30px] p-1">
                        <template x-for="p in getPeopleInDB(cat, blockName)" :key="p.id">
                            <div :data-id="p.id" class="db-row flex items-center justify-between group shadow-sm bg-white p-2 rounded-lg">
                                <div class="flex items-center gap-4"><span class="text-slate-300 font-bold">☰</span><img :src="getImgUrl(p.img)" class="w-10 h-10 rounded-full object-cover"><p class="text-[13px] font-black" x-text="p.name"></p></div>
                                <div class="flex gap-3 opacity-0 group-hover:opacity-100 transition-all"><button @click="editPersonnel(p)" class="text-blue-500 font-black text-[10px]">Sửa</button><button @click="deletePersonnel(p.id)" class="text-red-500 font-black text-[10px]">Xóa</button></div>
                            </div>
                        </template>
                    </div>
                </div>
            </template>
        </div>
    </div>
</template>
                    </div>
                </div> 
            </div>
        </div>
    </div>

    <script>
function app() {
    return {
        // --- CẤU HÌNH BIẾN HỆ THỐNG ---
        isAdmin: false, 
        showLoginModal: false, 
        loginInput: '', 
        search: '', 
        activeGroup: 'VIP', 
        filterCategory: 'Tất cả', 
        selectedPerson: null,
        editingId: null, 
        sortCat: '', 
        newCatName: '', 
        openTabs: {},
        categories: [], 
        blocks: {}, 
        catGroups: {}, 
        blocksOrder: {}, 
        data: [], 
        types: ['Giữ nguyên', 'Tái cử', 'Lần đầu'],
        form: { name: '', mainRole: '', partyRole: '', category: '', block: '', type: 'Giữ nguyên', img: '', dob: '', hometown: '', ethnic: 'Kinh', education: '', roles: '', bio: '' },
        
        adminEmails: ["luongbinhan@gmail.com", "pvhl.nba@gmail.com", "trannhung200677@gmail.com"],

        async init() {
            const cfg = { 
                apiKey: "AIzaSyAhbVR_ywdzMNnwaeKMp5rWNsT4otCF4xM", 
                authDomain: "pvhk-d32da.firebaseapp.com",
                projectId: "pvhk-d32da", 
                appId: "1:974778325507:web:eda0b36711f492cb764c36" 
            };
            if (!firebase.apps.length) firebase.initializeApp(cfg);
            this.db = firebase.firestore();

            // Tự động nhận diện Admin khi quay lại từ trang chủ hoặc F5
            firebase.auth().onAuthStateChanged(user => {
                if (user && this.adminEmails.includes(user.email)) {
                    this.isAdmin = true;
                }
            });

            this.db.collection("personnel_v8").orderBy("order", "asc").onSnapshot(s => { 
                this.data = s.docs.map(d => ({id: d.id, ...d.data()})); 
                this.$nextTick(() => this.reinitSortables()); 
            });

            this.db.collection("config").doc("master_structure_v29").onSnapshot(doc => { 
                if (doc.exists) { 
                    const d = doc.data(); 
                    this.categories = d.categories || []; 
                    this.blocks = d.blocks || {}; 
                    this.catGroups = d.catGroups || {}; 
                    this.blocksOrder = d.blocksOrder || {}; 
                    if(!this.sortCat) this.sortCat = this.categories[0]; 
                    this.$nextTick(() => this.reinitSortables());
                } 
            });
        },

        loginAdmin() {
            const currentUser = firebase.auth().currentUser;
            if (currentUser && this.adminEmails.includes(currentUser.email)) {
                this.isAdmin = true;
                return;
            }

            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });

            firebase.auth().signInWithPopup(provider)
                .then((result) => {
                    if (this.adminEmails.includes(result.user.email)) {
                        this.isAdmin = true;
                        alert("Chào Admin: " + result.user.displayName);
                    } else {
                        alert("Tài khoản không có quyền Admin!");
                        firebase.auth().signOut();
                    }
                })
                .catch((error) => {
                    if (error.code !== 'auth/cancelled-popup-request') {
                        console.error(error);
                        alert("Lỗi: " + error.message);
                    }
                });
        },

        logoutAdmin() {
            if(confirm("Xác nhận đăng xuất Admin?")) {
                firebase.auth().signOut().then(() => {
                    this.isAdmin = false;
                    location.reload();
                });
            }
        },

        getImgUrl(u) { 
            if(!u) return 'https://placehold.co/400x533?text=No+Image'; 
            const d = u.match(/[-\w]{25,}/); 
            return d ? `https://lh3.googleusercontent.com/d/${d[0]}` : u; 
        },

        reinitSortables() {
            const blockEl = document.getElementById('sortable-blocks-admin');
            if(blockEl) { if(blockEl._sortable) blockEl._sortable.destroy(); blockEl._sortable = Sortable.create(blockEl, { animation: 200 }); }
            const tabsEl = document.getElementById('sortable-tabs-admin');
            if(tabsEl) { if(tabsEl._sortable) tabsEl._sortable.destroy(); tabsEl._sortable = Sortable.create(tabsEl, { animation: 200 }); }
            this.categories.forEach(cat => { (this.blocks[cat] || []).forEach(block => {
                const el = document.getElementById(`sortable-db-${cat}-${block}`);
                if(el) { if(el._sortable) el._sortable.destroy(); el._sortable = Sortable.create(el, { animation: 200, handle: '.db-row', onEnd: async () => { await this.updatePersonnelOrder(el) } }); }
            }); });
        },

        async saveTabsOrder() {
            const el = document.getElementById('sortable-tabs-admin'); if (!el) return;
            const newOrder = Array.from(el.children).map(it => it.dataset.id).filter(id => id);
            this.categories = newOrder; await this.saveConfig(); alert("Đã cập nhật!");
        },

        async saveBlockOrder() {
            const el = document.getElementById('sortable-blocks-admin'); if (!el) return;
            const newOrder = Array.from(el.children).map(it => it.dataset.id).filter(id => id);
            if (this.sortCat) { this.blocksOrder[this.sortCat] = newOrder; this.blocks[this.sortCat] = newOrder; await this.saveConfig(); alert("Đã lưu!"); }
        },

        getBlocksInOrder(catName, groupName) {
            const activeBlocks = [...new Set(this.dataFilteredAll().filter(p => p.category === catName).map(it => it.block))];
            const savedOrder = this.blocksOrder[catName] || this.blocks[catName] || [];
            return savedOrder.filter(b => activeBlocks.includes(b)).concat(activeBlocks.filter(b => !savedOrder.includes(b)));
        },

        getPeopleByGroupAndBlock(g, b, cat) { return this.dataFilteredAll().filter(p => (this.catGroups[p.category] || 'CIP') === g && p.block === b && p.category === cat); },

        async saveConfig() { await this.db.collection("config").doc("master_structure_v29").set({ categories: this.categories, blocks: this.blocks, catGroups: this.catGroups, blocksOrder: this.blocksOrder }); },

        async savePersonnel() { 
            if(!this.form.name) return alert("Họ tên bắt buộc!"); 
            if(!this.form.block) this.form.block = (this.blocks[this.form.category] || [])[0];
            if(this.editingId) await this.db.collection("personnel_v8").doc(this.editingId).update(this.form); 
            else { await this.db.collection("personnel_v8").add({...this.form, order: this.data.length}); } 
            this.resetForm(); alert("Đã lưu!"); 
        },

        editPersonnel(p) { this.editingId = p.id; this.form = { ...p }; },

        resetForm() { this.editingId = null; this.form = { name: '', mainRole: '', partyRole: '', category: this.categories[0], block: (this.blocks[this.categories[0]] || [])[0], type: 'Giữ nguyên', img: '', dob: '', hometown: '', ethnic: 'Kinh', education: '', roles: '', bio: '' }; },

        deletePersonnel(id) { if(confirm("Xác nhận xóa?")) this.db.collection("personnel_v8").doc(id).delete(); },

        addNewCategory() { if(this.newCatName) { this.categories.push(this.newCatName); this.blocks[this.newCatName] = ['Mặc định']; this.catGroups[this.newCatName] = 'CIP'; this.saveConfig(); this.newCatName = ''; } },

        deleteCategory(name) { if(confirm(`Xóa ${name}?`)) { this.categories = this.categories.filter(c => c !== name); this.saveConfig(); } },

        addNewBlockAt(cat) { const el = document.getElementById('new-block-'+cat); const val = el.value.trim(); if(!val) return; if(!this.blocks[cat]) this.blocks[cat] = []; this.blocks[cat].push(val); this.saveConfig(); el.value = ''; },

        deleteBlockAt(cat, blockName) { if(confirm(`Xóa ${blockName}?`)) { this.blocks[cat] = this.blocks[cat].filter(b => b !== blockName); this.saveConfig(); } },

        toggleTab(cat) { this.openTabs[cat] = !this.openTabs[cat]; },

        formatList(t) { return t ? t.split('\n').filter(l => l.trim()).map(l => `<li>• ${l}</li>`).join('') : ''; },

        dataFilteredAll() {
            let base = this.data.filter(p => (this.catGroups[p.category] || 'CIP') === this.activeGroup);
            if (this.filterCategory !== 'Tất cả' && this.search === '') base = base.filter(p => p.category === this.filterCategory);
            const s = this.search.toLowerCase();
            if (!s) return base;
            return base.filter(p => (p.name?.toLowerCase().includes(s)) || (p.mainRole?.toLowerCase().includes(s)) || (p.hometown?.toLowerCase().includes(s)) || (p.partyRole?.toLowerCase().includes(s)) || (p.block?.toLowerCase().includes(s)));
        },

        setActiveGroup(g) { this.activeGroup = g; this.filterCategory = 'Tất cả'; this.search = ''; },

        hasPeopleInGroup(g) { return this.dataFilteredAll().some(p => (this.catGroups[p.category] || 'CIP') === g); },

        getPeopleInDB(cat, block) { return this.data.filter(p => p.category === cat && p.block === block); },

        async updatePersonnelOrder(el) { const batch = this.db.batch(); Array.from(el.children).forEach((it, idx) => { if(it.dataset.id) batch.update(this.db.collection("personnel_v8").doc(it.dataset.id), { order: idx }); }); await batch.commit(); },

        get filteredCategories() { return this.categories.filter(c => (this.catGroups[c] || 'CIP') === this.activeGroup); }
    }
}
</script>

<footer x-show="!isAdmin" class="w-full py-8 mt-auto">
        <div class="container mx-auto px-4">
            <div class="flex flex-col items-center justify-center opacity-40 hover:opacity-100 transition-opacity duration-500">
                <div class="h-px w-16 bg-slate-300 mb-4"></div>
                <p class="text-[10px] font-medium text-slate-500 tracking-[0.3em] uppercase mb-1">Developed & managed by</p>
                <p class="text-[12px] font-black text-slate-600 tracking-tighter uppercase italic">Nhung Tran <span class="mx-2 text-slate-300">|</span> © 2026 VIAGS</p>
            </div>
        </div>
    </footer>
</body>
